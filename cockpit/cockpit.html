<!DOCTYPE html><html lang="en">
<!--
  RL VALUE COCKPIT — viewing layer (board + player detail). PURE VIEW: it
  DISPLAYS values and computes NO price (only presentational math: rank, rail %,
  chart coordinates). None of the board app's price chain is present here.

  This file is a TEMPLATE. build_cockpit.py injects ONE seam object (DATA_SEAM)
  at the single placeholder below and writes the self-contained cockpit.html.
  DATA_SEAM.mode is the only place the data source is chosen:
    dev  -> load the synthetic fixture (no source-stamp expected)
    real -> load the real board; it MUST carry a valid `.srcmd5` source-stamp,
            else the ring-fence rejects it (contamination guard).
  If DATA_SEAM.data is left null (opening template.html directly), the app
  fetches DATA_SEAM.url at runtime for live-dev use.
  DATA CONTRACT: see cockpit/DATA_CONTRACT.md.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RL Value Cockpit</title>
<style>
:root{
  /* --- instrument palette: graphite ink, amber controls, phosphor-cyan data --- */
  --ink:#0e1217; --ink-2:#131922; --panel:#161d27; --panel-2:#1b2431;
  --rule:#232e3d; --rule-soft:#1c2531;
  --text:#e7edf4; --dim:#93a1b3; --faint:#5d6b7d;
  --amber:#e9b949;        /* THE interactive accent — user controls only */
  --amber-soft:rgba(233,185,73,.16);
  --phos:#4fc3d4;         /* data magnitude — the value rail glows this */
  --phos-soft:rgba(79,195,212,.14);
  --pos-mid:#7aa2f7; --pos-gdef:#5eba9e; --pos-kdef:#56c1d6;
  --pos-gfwd:#d99a5b; --pos-kfwd:#e0808a; --pos-ruc:#b088e8;
  --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --row-h:34px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--ink); color:var(--text); font-family:var(--sans);
  font-size:14px; line-height:1.4; -webkit-font-smoothing:antialiased;
  /* faint fixed instrument grid — static, no motion */
  background-image:linear-gradient(var(--rule-soft) 1px,transparent 1px),
                   linear-gradient(90deg,var(--rule-soft) 1px,transparent 1px);
  background-size:64px 64px; background-position:-1px -1px; background-attachment:fixed;
}
.num{font-family:var(--mono); font-variant-numeric:tabular-nums}
button{font-family:inherit; color:inherit; cursor:pointer}
:focus-visible{outline:2px solid var(--amber); outline-offset:2px; border-radius:3px}

/* ---------- shell ---------- */
.app{max-width:1240px; margin:0 auto; padding:0 18px 80px}
header.masthead{
  display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  padding:26px 2px 16px; border-bottom:1px solid var(--rule);
}
.brand{font-weight:800; letter-spacing:-.02em; font-size:20px}
.brand .glow{color:var(--phos)}
.eyebrow{font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--faint)}
.masthead .spacer{flex:1}
.readout{font-family:var(--mono); font-size:11px; color:var(--dim); text-align:right; line-height:1.5}
.readout b{color:var(--text); font-weight:700}

/* ---------- toolbar ---------- */
.toolbar{
  position:sticky; top:0; z-index:20; background:rgba(14,18,23,.86);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--rule);
  padding:12px 2px; display:flex; flex-direction:column; gap:10px;
}
.tb-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
.search{position:relative; flex:1; min-width:200px}
.search input{
  width:100%; background:var(--ink-2); border:1px solid var(--rule); border-radius:7px;
  color:var(--text); font-family:var(--mono); font-size:13px; padding:9px 34px 9px 12px;
}
.search input::placeholder{color:var(--faint)}
.search .hint{position:absolute; right:10px; top:50%; transform:translateY(-50%);
  font-family:var(--mono); font-size:11px; color:var(--faint); border:1px solid var(--rule);
  border-radius:4px; padding:1px 5px; pointer-events:none}
.sortsel{
  background:var(--ink-2); border:1px solid var(--rule); border-radius:7px; color:var(--text);
  font-family:var(--mono); font-size:12px; padding:9px 10px;
}
.seg{display:inline-flex; border:1px solid var(--rule); border-radius:7px; overflow:hidden}
.seg button{background:var(--ink-2); border:0; padding:9px 12px; font-family:var(--mono); font-size:12px; color:var(--dim)}
.seg button[aria-pressed="true"]{background:var(--amber-soft); color:var(--amber)}
.seg button+button{border-left:1px solid var(--rule)}

.chips{display:flex; gap:7px; flex-wrap:wrap; align-items:center}
.chip{
  display:inline-flex; align-items:center; gap:6px; background:var(--ink-2);
  border:1px solid var(--rule); border-radius:999px; padding:6px 11px 6px 9px;
  font-size:12px; color:var(--dim);
}
.chip .dot{width:9px; height:9px; border-radius:50%; background:var(--c,#888); flex:none}
.chip[aria-pressed="true"]{border-color:color-mix(in srgb,var(--c) 60%,var(--rule)); color:var(--text); background:color-mix(in srgb,var(--c) 12%,var(--ink-2))}
.chip.all{padding-left:11px}
.chip.all .dot{display:none}
.count{font-family:var(--mono); font-size:11.5px; color:var(--faint); margin-left:auto}

/* ---------- table ---------- */
/* .board is its OWN scroll viewport (fixed height) so the virtualiser can
   window rows against scrollTop — the large-N fixture scrolls smoothly. */
.board{width:100%; overflow:auto; border:1px solid var(--rule); border-radius:10px; margin-top:12px; background:var(--panel);
  max-height:calc(100vh - 210px); min-height:200px; overscroll-behavior:contain}
table{width:100%; border-collapse:collapse; min-width:640px}
/* virtualiser spacer rows — height stands in for the off-screen rows */
tr.vspace{height:0; padding:0; border:0; cursor:default}
tr.vspace:hover{background:transparent}
tr.vspace td{padding:0; border:0}
thead th{
  position:sticky; top:0; z-index:5; background:var(--panel-2);
  font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--dim);
  font-weight:600; text-align:left; padding:10px 12px; border-bottom:1px solid var(--rule);
  white-space:nowrap; user-select:none;
}
thead th.sortable{cursor:pointer}
thead th.sortable:hover{color:var(--text)}
thead th .arrow{color:var(--amber); font-size:9px; margin-left:4px}
th.r,td.r{text-align:right}
th.c,td.c{text-align:center}
tbody tr{border-bottom:1px solid var(--rule-soft); cursor:pointer; height:var(--row-h)}
tbody tr:last-child{border-bottom:0}
tbody tr:hover{background:var(--panel-2)}
tbody tr[aria-selected="true"]{background:color-mix(in srgb,var(--amber) 9%,var(--panel))}
tbody tr[aria-selected="true"] td:first-child{box-shadow:inset 3px 0 0 var(--amber)}
tbody td{padding:0 12px; white-space:nowrap; font-size:13px}
td.rank{font-family:var(--mono); color:var(--faint); font-size:12px; width:52px}
td.name{font-weight:600; max-width:220px; overflow:hidden; text-overflow:ellipsis}
td.name .sub{color:var(--faint); font-weight:400; font-size:11px; font-family:var(--mono); margin-left:8px}
.poschip{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:11.5px; color:var(--dim)}
.poschip .dot{width:8px; height:8px; border-radius:50%; background:var(--c,#888)}
.reclass{color:var(--amber); font-size:10px; margin-left:4px}

/* value rail — the signature device */
td.value{width:210px; padding:0}
.rail{position:relative; height:var(--row-h); display:flex; align-items:center; justify-content:flex-end; padding:0 12px}
.rail .fill{position:absolute; left:0; top:5px; bottom:5px; width:var(--w,0%);
  background:linear-gradient(90deg,var(--phos-soft),color-mix(in srgb,var(--phos) 42%,transparent));
  border-right:2px solid var(--phos); border-radius:0 2px 2px 0; min-width:2px}
.rail .fig{position:relative; font-family:var(--mono); font-variant-numeric:tabular-nums; font-weight:700; font-size:13px; z-index:1}
td.pick,td.yr{font-family:var(--mono); color:var(--dim); font-size:12px}

/* ---------- detail drawer ---------- */
.scrim{position:fixed; inset:0; background:rgba(6,9,13,.55); opacity:0; pointer-events:none; transition:opacity .18s; z-index:30}
.scrim.open{opacity:1; pointer-events:auto}
.drawer{
  position:fixed; top:0; right:0; height:100%; width:min(430px,100%);
  background:var(--panel); border-left:1px solid var(--rule); z-index:40;
  transform:translateX(100%); transition:transform .22s ease; overflow-y:auto;
  box-shadow:-24px 0 60px rgba(0,0,0,.4);
}
.drawer.open{transform:translateX(0)}
.dr-head{position:sticky; top:0; background:var(--panel-2); border-bottom:1px solid var(--rule); padding:18px 20px 16px; z-index:2}
.dr-close{position:absolute; top:14px; right:14px; background:var(--ink-2); border:1px solid var(--rule); border-radius:7px; width:32px; height:32px; font-size:16px; color:var(--dim); display:grid; place-items:center}
.dr-name{font-size:20px; font-weight:800; letter-spacing:-.02em; padding-right:40px}
.dr-id{font-family:var(--mono); font-size:11px; color:var(--faint); margin-top:4px}
.dr-body{padding:18px 20px 40px}
.idgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; margin-bottom:6px}
.idcell .k{font-size:10px; letter-spacing:.13em; text-transform:uppercase; color:var(--faint)}
.idcell .v{font-family:var(--mono); font-size:13px; margin-top:2px}
.idcell .v.big{font-size:17px; font-weight:700; color:var(--phos)}
.section-label{font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin:26px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--rule-soft); display:flex; justify-content:space-between; align-items:baseline}
.section-label .meta{color:var(--faint); font-family:var(--mono); letter-spacing:0; text-transform:none; font-size:11px}
.chart{background:var(--ink-2); border:1px solid var(--rule-soft); border-radius:8px; padding:10px 8px 4px}
.chart svg{display:block; width:100%; height:auto}
.chart .empty{color:var(--faint); font-family:var(--mono); font-size:12px; text-align:center; padding:22px 8px}
.reserved{border:1px dashed var(--rule); border-radius:8px; padding:18px 16px; color:var(--faint); background:repeating-linear-gradient(135deg,transparent,transparent 9px,var(--rule-soft) 9px,var(--rule-soft) 10px)}
.reserved .rtitle{color:var(--dim); font-size:12px; font-weight:600; margin-bottom:6px}
.reserved .rbody{font-size:12px; line-height:1.5}

.empty-board{padding:48px 16px; text-align:center; color:var(--faint); font-family:var(--mono); font-size:13px}

/* ring-fence rejection panel — shown when real-mode gets an unstamped source */
.reject{margin-top:12px; border:1px solid var(--pos-kfwd); border-radius:10px; background:var(--panel);
  padding:26px 22px; font-family:var(--mono)}
.reject h2{margin:0 0 8px; font-size:15px; color:var(--pos-kfwd); letter-spacing:.02em}
.reject p{margin:6px 0; font-size:12.5px; color:var(--dim); line-height:1.6}
.reject code{background:var(--ink-2); border:1px solid var(--rule); border-radius:4px; padding:1px 5px; color:var(--text)}
/* mode badge in the readout — makes dev/real visible at a glance */
.modebadge{display:inline-block; font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
  padding:2px 7px; border-radius:5px; border:1px solid var(--rule); margin-left:8px}
.modebadge.dev{color:var(--phos); border-color:color-mix(in srgb,var(--phos) 45%,var(--rule)); background:var(--phos-soft)}
.modebadge.real{color:var(--amber); border-color:color-mix(in srgb,var(--amber) 45%,var(--rule)); background:var(--amber-soft)}
footer{margin-top:22px; color:var(--faint); font-size:11px; font-family:var(--mono); text-align:center; line-height:1.7}

@media (max-width:760px){
  .app{padding:0 12px 60px}
  .readout{display:none}
  td.value{width:130px}
  .drawer{width:100%}
  .idgrid{grid-template-columns:1fr 1fr}
}
@media (max-width:560px){
  .narrow-hide{display:none}
  table{min-width:0}
  td.name{max-width:130px}
}
@media (prefers-reduced-motion:reduce){
  .drawer,.scrim{transition:none}
}
</style>

<div class="app">
  <header class="masthead">
    <div>
      <div class="eyebrow">Real-Draft Value Engine</div>
      <div class="brand">Value <span class="glow">Cockpit</span></div>
    </div>
    <div class="spacer"></div>
    <div class="readout" id="readout"></div>
  </header>

  <div class="toolbar">
    <div class="tb-row">
      <div class="search">
        <input id="search" type="search" placeholder="Search player or club…" autocomplete="off" aria-label="Search players">
        <span class="hint">/</span>
      </div>
      <select class="sortsel" id="sort" aria-label="Sort order">
        <option value="v.desc">Value ▾ (high→low)</option>
        <option value="v.asc">Value ▴ (low→high)</option>
        <option value="n.asc">Name A→Z</option>
        <option value="yr.desc">Draft year (newest)</option>
        <option value="yr.asc">Draft year (oldest)</option>
      </select>
      <div class="seg" role="group" aria-label="Value rail scale">
        <button id="scaleLin" aria-pressed="true">Linear</button>
        <button id="scaleLog" aria-pressed="false">Log</button>
      </div>
    </div>
    <div class="tb-row">
      <div class="chips" id="posChips" role="group" aria-label="Filter by position"></div>
      <span class="count" id="count"></span>
    </div>
  </div>

  <div class="reject" id="reject" hidden></div>

  <div class="board" id="board">
    <table>
      <thead>
        <tr>
          <th class="r">#</th>
          <th class="sortable" data-sort="n">Player</th>
          <th>Pos</th>
          <th class="r sortable" data-sort="v">Value</th>
          <th class="r narrow-hide">Pick</th>
          <th class="r sortable narrow-hide" data-sort="yr">Draft</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty-board" id="emptyBoard" hidden>No players match the current filters.</div>
  </div>

  <footer id="footer"></footer>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Player detail"></aside>

  const nc={}; PLAYERS.forEach(p=>{ nc[p.n]=(nc[p.n]||0)+1; });
  DUP = new Set(Object.keys(nc).filter(n=>nc[n]>1));

/* ---------- ring-fence: source-stamp check ----------
   THE contamination guard. Real-mode asserts the loaded board carries a valid
   `.srcmd5` source-stamp (lowercase hex md5, short-8 or full-32 form, matching
   the repo's md5 convention). Dev-mode loads the fixture with no stamp. */
function checkStamp(raw, mode){
  if(mode==="real"){
    const stamp = raw ? raw[".srcmd5"] : null;
    if(stamp==null)
      return {ok:false, reason:"no <code>.srcmd5</code> source-stamp is present"};
    if(!/^[0-9a-f]{8}([0-9a-f]{24})?$/.test(String(stamp)))
      return {ok:false, reason:`<code>.srcmd5</code> value <code>${esc(String(stamp))}</code> is not a valid md5 stamp`};
    return {ok:true, note:`source-stamp ${stamp} verified`, stamp:String(stamp)};
  }
  // dev-mode
  const fx = raw ? raw["_FIXTURE"] : null;
  return {ok:true, note: fx?`fixture loaded — ${fx}`:"dev source loaded", fixture:!!fx};
}
function renderRejection(gate, seam){
  const tb=document.querySelector(".toolbar"); if(tb) tb.style.display="none";
  const board=document.getElementById("board"); if(board) board.hidden=true;
  const r=document.getElementById("reject"); r.hidden=false;
  r.innerHTML =
    `<h2>■ Source rejected — real-mode ring-fence</h2>`+
    `<p>The viewer is in <code>real</code> mode, which requires the loaded board to carry a valid `+
    `<code>.srcmd5</code> source-stamp. This source failed the check:</p>`+
    `<p style="color:var(--pos-kfwd)">✗ ${gate.reason}.</p>`+
    `<p>Nothing is rendered. This is the contamination guard working as designed — an unstamped or `+
    `synthetic source cannot be shown as if it were the sealed board.</p>`+
    `<p style="color:var(--faint)">Source: <code>${esc(seam.url||"(inlined)")}</code> &nbsp;·&nbsp; `+
    `switch <code>DATA_SEAM.mode</code> to <code>dev</code> to load the fixture, or stamp the board `+
    `(companion published-stamp job).</p>`;
  const rd=document.getElementById("readout"); if(rd) rd.innerHTML=`<span class="modebadge real">real · rejected</span>`;
  const ft=document.getElementById("footer"); if(ft) ft.innerHTML=
    `real-mode ring-fence active &nbsp;•&nbsp; unstamped source rejected &nbsp;•&nbsp; see DATA_CONTRACT.md`;
}

/* Map the raw board schema -> compact viewer contract. Mirrors the transform in
   build_cockpit.py (kept deliberately in sync). Tolerant: prefers the richer
   baked-matrix keys (pos/cpos/cur/Vpath/Ppath/yrs) if a future re-bake adds them. */
function normaliseRaw(d){
  const BY = d.BASE_YEAR||2026, years=[BY-2,BY-1,BY,BY+1,BY+2];
  const map = (r,src)=>{
    const grp = r.pos || r.grp;              // current position group
    const cpos = r.cpos || r.grp;
    const fut = (r.fut||[]).map(x=>[x[0],x[1]]);
    return {
      k:r.key, n:r.name, pos:grp, cpos:cpos, fut,
      pk:(r.pk===undefined?r.pick:r.pk), yr:(r.yr===undefined?r.year:r.yr),
      cat:r.cat, ty:r.ty||r.type, club:r.club, draft:r.draft,
      v:(r.cur!==undefined?r.cur:r.v),
      vpath:(r.Vpath||[r.vM2,r.vM1,r.v,r.vP1,r.vP2]),
      years:(r.yrs||years),
      ppath:(r.Ppath ? r.Ppath.map((a,i)=>[i+1,a]) : (r.track||[]).map(t=>[t.s,t.a])),
      g:r.g, cg:r.cg, age:r.age, bk:!!r.bk, src:src
    };
  };
  const players=[...(d.active||[]).map(r=>map(r,"active")),
                 ...(d.back||[]).map(r=>map(r,"back"))];
  return {players, meta:{baseYear:BY, years}};
}

function buildChips(){

  all.className="chip all"; all.id="chipAll"; all.setAttribute("aria-pressed","true");
  all.textContent="All positions";

  wrap.appendChild(all);
  POS.forEach(p=>{

    b.dataset.pos=p.k;
    b.innerHTML=`<span class="dot"></span>${p.label}`;
    b.onclick=()=>{ state.pos.has(p.k)?state.pos.delete(p.k):state.pos.add(p.k); syncChips(); recompute(true); };
    wrap.appendChild(b);
  });
}

    b.setAttribute("aria-pressed", state.pos.has(b.dataset.pos)));

function wire(){
  const s=document.getElementById("search");
  s.addEventListener("input",()=>{ state.q=s.value.trim().toLowerCase(); recompute(true); });
  document.getElementById("sort").addEventListener("change",e=>{ state.sort=e.target.value; recompute(true); });
  document.querySelectorAll("thead th.sortable").forEach(th=>{
    th.addEventListener("click",()=>{
      const col=th.dataset.sort;
      const cur=state.sort.split(".");
      let dir = col==="n"?"asc":"desc";
      if(cur[0]===col) dir = cur[1]==="desc"?"asc":"desc";
      state.sort=`${col}.${dir}`;
      document.getElementById("sort").value=state.sort;
      recompute(true);
    });

    document.getElementById("scaleLin").setAttribute("aria-pressed", v==="lin");
    document.getElementById("scaleLog").setAttribute("aria-pressed", v==="log"); renderWindow(); };
  document.getElementById("scaleLin").onclick=()=>setScale("lin");
  document.getElementById("scaleLog").onclick=()=>setScale("log");
  document.getElementById("scrim").onclick=closeDrawer;

  // virtualiser: re-window on scroll (rAF-throttled) and on resize
  const board=document.getElementById("board");
  board.addEventListener("scroll",()=>{ if(rafPending) return; rafPending=true;
    requestAnimationFrame(()=>{ rafPending=false; renderWindow(); }); });
  window.addEventListener("resize",()=>renderWindow());

  // one delegated click handler for the whole (virtualised) body
  document.getElementById("rows").addEventListener("click",e=>{
    const tr=e.target.closest("tr[data-k]"); if(!tr) return;
    state.focusIdx=+tr.dataset.i; openDrawer(tr.dataset.k);
  });

  document.addEventListener("keydown",e=>{
    if(e.key==="/" && document.activeElement!==s){ e.preventDefault(); s.focus(); s.select(); return; }
    if(e.key==="Escape"){ closeDrawer(); return; }
    const a=document.activeElement;
    const tr=(a&&a.closest)?a.closest("#rows tr[data-k]"):null;
    if(!tr) return;
    if(e.key==="ArrowDown"){ e.preventDefault(); setFocus(+tr.dataset.i+1); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); setFocus(+tr.dataset.i-1); }
    else if(e.key==="Enter"||e.key===" "){ e.preventDefault(); state.focusIdx=+tr.dataset.i; openDrawer(tr.dataset.k); }
  });
}

/* ---------- filter + sort ---------- */
function view(){
  let rows=PLAYERS;
  if(state.pos.size) rows=rows.filter(p=>state.pos.has(p.pos));
  if(state.q){ const q=state.q;
    rows=rows.filter(p=>(p.n||"").toLowerCase().includes(q)||(p.club||"").toLowerCase().includes(q)); }
  const [col,dir]=state.sort.split("."); const s=dir==="asc"?1:-1;
  rows=[...rows].sort((a,b)=>{
    let d;
    if(col==="n") d=(a.n||"").localeCompare(b.n||"");
    else if(col==="yr") d=(a.yr||0)-(b.yr||0);
    else d=(a.v||0)-(b.v||0);
    if(d) return s*d;
    // deterministic, direction-independent tiebreak so ties are stable-sorted
    const dv=(b.v||0)-(a.v||0); if(dv) return dv;
    const dn=(a.n||"").localeCompare(b.n||""); if(dn) return dn;
    return a._i-b._i;
  });
  return rows;
}
function railW(v){
  let w;
  if(state.scale==="log"){ const vv=Math.max(0,v||0); w=(Math.log(vv+1)/Math.log(Math.max(MAXV,1)+1))*100; }
  else w=((v||0)/MAXV)*100;
  return Math.max(0, Math.min(100, w));   // clamp: negatives -> 0, over-max -> 100
}
function fmt(n){ return n==null?"—":Math.round(n).toLocaleString("en-US"); }

  // distinguish same-display-name collisions by their stable id; flag retired
  const subs=[];
  if(DUP.has(p.n)) subs.push(esc(p.k));
  if(p.src==="back") subs.push("retired");
  const sub=subs.length?`<span class="sub">${subs.join(" · ")}</span>`:"";
  const pick=p.pk==null?"—":p.pk;
  return `<tr tabindex="0" data-k="${esc(p.k)}" data-i="${i}" aria-selected="${state.selected===p.k}">`+
      `<td class="rank r">${p._rank}</td>`+
      `<td class="name" title="${esc(p.n)}">${esc(p.n)}${sub}</td>`+
      `<td><span class="poschip"><span class="dot" style="background:${pm.c}"></span>${POSLABEL[p.pos]||p.pos||"—"}${reclass}</span></td>`+
      `<td class="value"><div class="rail"><div class="fill" style="width:${railW(p.v).toFixed(2)}%"></div><span class="fig">${fmt(p.v)}</span></div></td>`+
      `<td class="pick r narrow-hide">${pick}</td>`+
      `<td class="yr r narrow-hide">${p.yr==null?"—":p.yr}</td>`+
    `</tr>`;
}
function renderWindow(){
  const board=document.getElementById("board");
  const tb=document.getElementById("rows");
  const N=state.rows.length;
  const thead=board.querySelector("thead");
  THEADH = thead ? thead.offsetHeight : 0;
  const clientH = board.clientHeight || 480;
  const relTop = board.scrollTop - THEADH;
  const relBot = board.scrollTop + clientH - THEADH;
  let start = Math.max(0, Math.floor(relTop/ROWH) - OVERSCAN);
  let end   = Math.min(N, Math.ceil(relBot/ROWH) + OVERSCAN);
  if(end<start) end=start;
  // if a board row currently holds focus, rebuilding innerHTML would drop it —
  // remember so we can restore keyboard focus to the same logical row.
  const hadFocus = tb.contains(document.activeElement);
  const topH=start*ROWH, botH=(N-end)*ROWH;
  let html = topH>0 ? `<tr class="vspace" style="height:${topH}px"><td colspan="6"></td></tr>` : "";
  for(let i=start;i<end;i++) html+=rowHTML(state.rows[i], i);
  html += botH>0 ? `<tr class="vspace" style="height:${botH}px"><td colspan="6"></td></tr>` : "";
  tb.innerHTML=html;
  if(!calibrated) calibrate();
  if(hadFocus && state.focusIdx>=start && state.focusIdx<end){
    const el=tb.querySelector(`tr[data-i="${state.focusIdx}"]`); if(el) el.focus();
  }
}
function calibrate(){
  const rs=document.querySelectorAll("#rows tr[data-k]");
  if(rs.length>=2){
    const pitch=rs[1].offsetTop-rs[0].offsetTop;
    calibrated=true;
    if(pitch>0 && Math.abs(pitch-ROWH)>0.5){ ROWH=pitch; renderWindow(); }
  }
}
function setFocus(idx){
  const N=state.rows.length; if(!N) return;
  idx=Math.max(0, Math.min(N-1, idx)); state.focusIdx=idx;
  const board=document.getElementById("board");
  const clientH=board.clientHeight;
  const rowContentY = THEADH + idx*ROWH;                 // row top in scroll-content coords
  if(rowContentY < board.scrollTop + THEADH) board.scrollTop = idx*ROWH;               // under sticky header
  else if(rowContentY + ROWH > board.scrollTop + clientH) board.scrollTop = rowContentY + ROWH - clientH;
  renderWindow();
  const el=document.querySelector(`#rows tr[data-i="${idx}"]`); if(el) el.focus();
}

/* ---------- detail drawer ---------- */
function openDrawer(k){
  const p=PLAYERS.find(x=>x.k===k); if(!p) return;
  state.selected=k; renderWindow();
  const pm=POSMAP[p.pos]||{c:"#888",label:p.pos};
  const topFut=(p.fut&&p.fut.length)?p.fut.slice().sort((a,b)=>b[1]-a[1])[0][0]:null;
  const reclass=(topFut&&topFut!==p.pos)
    ? `<span class="reclass" style="font-size:12px">now ${POSLABEL[p.pos]} · projecting ${POSLABEL[topFut]}</span>` : "";
  const catTxt=p.cat&&p.cat!=="None"?p.cat:"—";
  const idcell=(kk,v,big)=>`<div class="idcell"><div class="k">${kk}</div><div class="v ${big?"big":""}">${v}</div></div>`;

  const dr=document.getElementById("drawer");
  dr.innerHTML=`
    <div class="dr-head">
      <button class="dr-close" aria-label="Close detail" onclick="closeDrawer()">✕</button>
      <div class="dr-name">${esc(p.n)}</div>
      <div class="dr-id"><span class="poschip"><span class="dot" style="background:${pm.c}"></span>${POSLABEL[p.pos]||p.pos}</span> · ${esc(p.club||"—")} · ${esc(p.k)}</div>
    </div>
    <div class="dr-body">
      <div class="idgrid">
        ${idcell("Current value", fmt(p.v)+"<span style='color:var(--faint);font-size:11px'> · #"+p._rank+"</span>", true)}
        ${idcell("Position", (POSLABEL[p.pos]||p.pos||"—")+" "+reclass)}
        ${idcell("Draft pick", p.pk==null?"—":("#"+p.pk))}
        ${idcell("Draft year", p.yr==null?"—":p.yr)}
        ${idcell("Category", esc(catTxt))}
        ${idcell("Type / channel", esc((p.ty||"—")+(p.draft&&p.draft!=="None"?" · "+p.draft:"")))}
        ${idcell("Games (career)", (p.g==null?"—":p.g)+(p.cg&&p.cg!==p.g?" · "+p.cg+" incl. pre":""))}
        ${idcell("Age", p.age==null?"—":p.age)}
      </div>

      <div class="section-label">Value trajectory <span class="meta">value by year</span></div>
      <div class="chart">${lineChart(p.years, p.vpath, BYEAR)}</div>

      <div class="section-label">Points trajectory <span class="meta">score by career season</span></div>
      <div class="chart">${barChart(p.ppath)}</div>

      <div class="section-label">Round-by-round rating history <span class="meta">reserved</span></div>
      <div class="reserved">
        <div class="rtitle">Wired in the weekly-loop phase</div>
        <div class="rbody">Once the model stabilises, the weekly loop will feed a per-player,
        per-round value series here — a live sparkline of how ${esc(firstName(p.n))}'s price moved
        week to week. Space is held; nothing is rendered yet. See DATA_CONTRACT.md.</div>
      </div>
    </div>`;
  dr.classList.add("open"); dr.setAttribute("aria-hidden","false");
  document.getElementById("scrim").classList.add("open");
  dr.querySelector(".dr-close").focus();
}
function closeDrawer(){
  const dr=document.getElementById("drawer");
  dr.classList.remove("open"); dr.setAttribute("aria-hidden","true");
  document.getElementById("scrim").classList.remove("open");
  const sel=state.selected; state.selected=null;
  if(sel!=null){
    renderWindow();
    const tr=document.querySelector(`#rows tr[data-k="${cssq(sel)}"]`);
    if(tr) tr.focus();
  }
}

/* ---------- charts (inline SVG, no libraries — presentational math only) ---------- */
function lineChart(years, vals, baseYear){
  const pts = (years||[]).map((y,i)=>[y, vals&&vals[i]!=null?vals[i]:null]).filter(p=>p[1]!=null);
  if(!pts.length) return `<div class="empty">No value path.</div>`;
  const W=380,H=132,padL=44,padR=12,padT=14,padB=24;
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const xmin=Math.min(...xs), xmax=Math.max(...xs);
  const ymax=Math.max(...ys,1), ymin=Math.min(...ys,0);
  const X=x=> xmax===xmin?padL+(W-padL-padR)/2 : padL+((x-xmin)/(xmax-xmin))*(W-padL-padR);
  const Y=y=> ymax===ymin?H-padB-(H-padT-padB)/2 : H-padB-((y-ymin)/(ymax-ymin))*(H-padT-padB);
  const line=pts.map((p,i)=>`${i?"L":"M"}${X(p[0]).toFixed(1)},${Y(p[1]).toFixed(1)}`).join(" ");
  const area=`${line} L${X(pts[pts.length-1][0]).toFixed(1)},${H-padB} L${X(pts[0][0]).toFixed(1)},${H-padB} Z`;
  const gy=[ymin,(ymin+ymax)/2,ymax];
  const grid=gy.map(g=>`<line x1="${padL}" y1="${Y(g).toFixed(1)}" x2="${W-padR}" y2="${Y(g).toFixed(1)}" stroke="var(--rule-soft)"/>`
    +`<text x="${padL-6}" y="${(Y(g)+3).toFixed(1)}" text-anchor="end" class="axl">${fmt(g)}</text>`).join("");
  const dots=pts.map(p=>{ const cur=p[0]===baseYear;
    return `<circle cx="${X(p[0]).toFixed(1)}" cy="${Y(p[1]).toFixed(1)}" r="${cur?4:2.6}" fill="${cur?"var(--amber)":"var(--phos)"}" stroke="var(--ink-2)" stroke-width="1.5"/>`; }).join("");
  const xlab=pts.map(p=>`<text x="${X(p[0]).toFixed(1)}" y="${H-8}" text-anchor="middle" class="axl ${p[0]===baseYear?"cur":""}">${p[0]}</text>`).join("");
  return svg(W,H,`${grid}<path d="${area}" fill="var(--phos-soft)"/><path d="${line}" fill="none" stroke="var(--phos)" stroke-width="2"/>${dots}${xlab}`)
    + (pts.length===1?`<div class="empty" style="padding:6px 0 2px">Single-year estimate.</div>`:"");
}
function barChart(pp){
  const pts=(pp||[]).filter(p=>p[1]!=null);
  if(!pts.length) return `<div class="empty">No games recorded yet.</div>`;
  const W=380,H=132,padL=44,padR=12,padT=14,padB=24;
  const ymax=Math.max(...pts.map(p=>p[1]),1);
  const n=pts.length, bw=(W-padL-padR)/n*0.62, gap=(W-padL-padR)/n;
  const Y=y=>H-padB-(y/ymax)*(H-padT-padB);
  const gy=[0,ymax/2,ymax];
  const grid=gy.map(g=>`<line x1="${padL}" y1="${Y(g).toFixed(1)}" x2="${W-padR}" y2="${Y(g).toFixed(1)}" stroke="var(--rule-soft)"/>`
    +`<text x="${padL-6}" y="${(Y(g)+3).toFixed(1)}" text-anchor="end" class="axl">${Math.round(g)}</text>`).join("");
  const bars=pts.map((p,i)=>{ const x=padL+gap*i+(gap-bw)/2, y=Y(p[1]);
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${(H-padB-y).toFixed(1)}" rx="1.5" fill="var(--phos)" opacity="0.82"/>`
      +`<text x="${(x+bw/2).toFixed(1)}" y="${H-8}" text-anchor="middle" class="axl">S${p[0]}</text>`; }).join("");
  return svg(W,H,`${grid}${bars}`);
}
function svg(W,H,inner){
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="chart">
    <style>.axl{fill:var(--faint);font-family:var(--mono);font-size:9.5px}.axl.cur{fill:var(--amber)}</style>${inner}</svg>`;
}

/* ---------- utils ---------- */
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function cssq(s){ return String(s).replace(/["\\]/g,"\\$&"); }
function firstName(n){ return (n||"the player").split(" ")[0]; }
</script>

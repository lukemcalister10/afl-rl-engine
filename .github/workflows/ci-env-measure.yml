name: CI ENV MEASURE (ci-env-pin, TEMPORARY — remove after Part 1)

# ============================================================================================
# TEMPORARY DIAGNOSTIC WORKFLOW — ci-env-pin job, 2026-07-14.
#
# A MEASUREMENT INSTRUMENT, not a guard. It reimplements NO guard logic and gates NOTHING (it never
# fails the build on a mismatch — its whole output is the log). It answers, on a GitHub runner itself,
# the question the panel failure has only let us INFER: what is CI's actual OpenBLAS configuration, and
# does the board move because of the BLAS KERNEL, the THREAD COUNT, BOTH, or something unnamed?
#
# REMOVED from the repo before this job is finalized. The only permanent CI change from this job is the
# ONE diagnostic print line in ci-guards.yml.
#
# E1: dump the runner environment (helper _envdump.py) + /proc/cpuinfo + nproc.
# E2: build the board FOUR times, SEPARATELY, in ONE job (one runner, one CPU), md5 each:
#       1 baseline (as CI runs)   2 OPENBLAS_NUM_THREADS=1   3 OPENBLAS_CORETYPE=Haswell   4 both
#     Verdict target = the pinned board of record 3dc19fbbf920958affe7c6a2be9697d2.
# ============================================================================================

on:
  push:
    branches:
      - claude/ci-environment-measurement-names-zbqg78
  workflow_dispatch:

jobs:
  measure:
    runs-on: ubuntu-24.04
    timeout-minutes: 50   # single-threaded builds (runs 2 & 4) are slow; 4 builds + provisioning fit comfortably
    env:
      RL_REPO: ${{ github.workspace }}
      CLAUDE_PROJECT_DIR: ${{ github.workspace }}
      PYTHONHASHSEED: "0"
      PYTHONPATH: /home/claude/rl_workspace/rl_after:/home/claude/rl_vendor
      RL_CONFIG_MODE: bake
      DIAG: ${{ github.workspace }}/session_2026-07-14/ci_env_pin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Ensure python3.12 on PATH
        run: |
          set -euo pipefail
          if ! command -v python3.12 >/dev/null 2>&1; then
            PYBIN="$(dirname "$(command -v python)")"
            ln -s "$PYBIN/python" "$PYBIN/python3.12"
          fi
          python3.12 --version

      - name: Create engine absolute-path root (/home/claude/...)
        run: sudo mkdir -p /home/claude && sudo chown -R "$USER":"$USER" /home/claude

      - name: Provision pinned env (setup_env.sh)
        run: |
          set -euo pipefail
          bash setup_env.sh
          echo "$HOME/rl_venv312/bin" >> "$GITHUB_PATH"

      - name: Bootstrap workspace
        run: bash bootstrap.sh

      - name: "E1 — DUMP THE RUNNER ENVIRONMENT"
        run: |
          set -uo pipefail
          echo "================= E1 : RUNNER ENVIRONMENT ================="
          echo "nproc = $(nproc)"
          grep -m1 'model name' /proc/cpuinfo || true
          printf 'SIMD flags: '; grep -m1 flags /proc/cpuinfo | tr ' ' '\n' | grep -E '^(sse2|sse4_2|avx|avx2|avx512f|avx512dq|fma)$' | tr '\n' ' '; echo
          echo "--- pre-set BLAS/thread env vars (shell view) ---"
          env | grep -E '^(OPENBLAS|OMP|MKL|NPY|BLIS|VECLIB|NUMEXPR|GOTO)' || echo "(none set)"
          echo "--- python / numpy / BLAS ---"
          python3 "$DIAG/_envdump.py"
          echo "================= E1 END ================="

      - name: "E2 — FOUR BOARD BUILDS (threading / kernel / both attribution)"
        run: |
          set -uo pipefail
          TARGET=3dc19fbbf920958affe7c6a2be9697d2
          WS=/home/claude/rl_workspace/rl_after
          echo "================= E2 : FOUR BUILDS (target=$TARGET) ================="
          for spec in "1-baseline|" "2-threads1|OPENBLAS_NUM_THREADS=1 OMP_NUM_THREADS=1" "3-kernelHaswell|OPENBLAS_CORETYPE=Haswell" "4-both|OPENBLAS_NUM_THREADS=1 OMP_NUM_THREADS=1 OPENBLAS_CORETYPE=Haswell"; do
            label="${spec%%|*}"; vars="${spec#*|}"
            echo "----- RUN[$label]  env: ${vars:-<baseline>} -----"
            (
              cd "$WS"
              if [ -n "$vars" ]; then export $vars; fi
              python3 "$DIAG/_probe_blas.py"
              if python3 rl_export.py >/tmp/rlx.log 2>&1; then
                md5=$(md5sum "$WS/rl_app_data.json" | cut -d' ' -f1)
                if [ "$md5" = "$TARGET" ]; then verdict="== 3dc19fbb (RECOVERS the pinned board)"; else verdict="DIFFERS from pinned"; fi
                echo "RUN[$label]  board=$md5  $verdict"
              else
                echo "RUN[$label]  rl_export FAILED:"; tail -6 /tmp/rlx.log
              fi
            )
          done
          echo "================= E2 END ================="
          echo "VERDICT RULE: threads1 alone recovers -> THREADING (pin threads, NOT coretype);"
          echo "              kernel alone recovers -> KERNEL; only both -> BOTH; neither -> UNKNOWN (pin nothing)."

name: ITEM 408 Apply Prestop

on:
  push:
    branches:
      - tmp/item408-prestop-apply
  pull_request:

permissions:
  contents: write

concurrency:
  group: item408-prestop-apply
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout helper branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct exact implementation patch
        env:
          BASE: 83ed3bb1606b708af16a2ad90a26d63553de6789
          EXPECTED_FULL_SHA256: 05340b89a4888f32cb191b7a66b6bc5600189a7f8f2acb123f04eeb9d4afe8eb
          EXPECTED_IMPL_SHA256: fe0e398134cc747d2654be911fa8a0e97a5cacab99a3b35a2f53eb989fdd038f
        run: |
          set -euo pipefail
          cat .item408_apply/part.* | tr -d '\n' | base64 -d > /tmp/item408-full.patch
          python3 - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          full = Path('/tmp/item408-full.patch')
          text = full.read_text(encoding='utf-8')
          replacements = [
              ('remains the remains the', 'remains the'),
              ('CLOSED A(the ring fence', 'CLOSED (the ring fence'),
              ('+2  3. UNKNOWN', '+  3. UNKNOWN'),
              ('CLOSED A(ring fence', 'CLOSED (ring fence'),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'transport correction {old!r} count={count}, expected 1')
              text = text.replace(old, new, 1)
          full.write_text(text, encoding='utf-8')
          full_digest = hashlib.sha256(full.read_bytes()).hexdigest()
          if full_digest != os.environ['EXPECTED_FULL_SHA256']:
              raise SystemExit(f'full patch sha256 {full_digest} != expected')

          marker = 'diff --git a/docs/directives/ITEM_408_CLAIMS_NOTE.md b/docs/directives/ITEM_408_CLAIMS_NOTE.md\n'
          start = text.index(marker)
          end = text.index('\ndiff --git ', start + 1) + 1
          impl_text = text[:start] + text[end:]
          impl = Path('/tmp/item408-impl.patch')
          impl.write_text(impl_text, encoding='utf-8')
          impl_digest = hashlib.sha256(impl.read_bytes()).hexdigest()
          if impl_digest != os.environ['EXPECTED_IMPL_SHA256']:
              raise SystemExit(f'implementation patch sha256 {impl_digest} != expected')
          print(f'full_patch_sha256={full_digest}')
          print(f'implementation_patch_sha256={impl_digest}')
          PY

      - name: Fast-forward implementation onto current evidence head
        env:
          BASE: 83ed3bb1606b708af16a2ad90a26d63553de6789
          TARGET: ci/r19-provenance-migration
        run: |
          set -euo pipefail
          git fetch origin "$TARGET"
          git checkout --detach "origin/$TARGET"
          git merge-base --is-ancestor "$BASE" HEAD
          parent="$(git rev-parse HEAD)"
          git apply --check /tmp/item408-impl.patch
          git apply /tmp/item408-impl.patch
          git diff --check
          git add -A
          git config user.name "afl-rl build-seat"
          git config user.email "build-seat@users.noreply.github.com"
          tree="$(git write-tree)"
          commit="$(printf '%s\n' 'ci(item-408): prepare R19 provenance STOP-1' | git commit-tree "$tree" -p "$parent")"
          git push origin "$commit:refs/heads/$TARGET"
          {
            echo "parent=$parent"
            echo "published=$commit"
            echo "base=$BASE"
          } | tee /tmp/item408-publication.txt

      - name: Upload publication receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: item408-prestop-publication
          path: /tmp/item408-publication.txt
          if-no-files-found: error

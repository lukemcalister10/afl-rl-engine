name: ITEM 408 Apply Prestop

on:
  push:
    branches:
      - tmp/item408-prestop-apply
  pull_request:

permissions:
  contents: write

concurrency:
  group: item408-prestop-apply
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout helper branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export staged transport
        uses: actions/upload-artifact@v4
        with:
          name: item408-prestop-transport
          path: .item408_apply/part.*
          include-hidden-files: true
          if-no-files-found: error

      - name: Reconstruct and diagnose patch
        env:
          BASE: 83ed3bb1606b708af16a2ad90a26d63553de6789
          EXPECTED_PATCH_SHA256: 05340b89a4888f32cb191b7a66b6bc5600189a7f8f2acb123f04eeb9d4afe8eb
        run: |
          set +e
          cat .item408_apply/part.* | tr -d '\n' > /tmp/item408.b64
          base64 -d /tmp/item408.b64 > /tmp/item408.patch 2> /tmp/item408.decode.err
          decode_rc=$?
          python3 - <<'PY' > /tmp/item408.transport-fix.out 2> /tmp/item408.transport-fix.err
          import hashlib
          import os
          from pathlib import Path

          path = Path('/tmp/item408.patch')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ('remains the remains the', 'remains the'),
              ('CLOSED A(the ring fence', 'CLOSED (the ring fence'),
              ('+2  3. UNKNOWN', '+  3. UNKNOWN'),
              ('CLOSED A(ring fence', 'CLOSED (ring fence'),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'transport correction {old!r} count={count}, expected 1')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          expected = os.environ['EXPECTED_PATCH_SHA256']
          print(f'corrected_patch_sha256={digest}')
          if digest != expected:
              raise SystemExit(f'corrected patch sha256 {digest} != {expected}')
          PY
          transport_fix_rc=$?
          git checkout --detach "$BASE"
          git apply --check /tmp/item408.patch > /tmp/item408.apply.out 2> /tmp/item408.apply.err
          apply_rc=$?
          {
            echo "decode_rc=$decode_rc"
            echo "transport_fix_rc=$transport_fix_rc"
            echo "apply_rc=$apply_rc"
            wc -c /tmp/item408.b64 /tmp/item408.patch
            sha256sum /tmp/item408.b64 /tmp/item408.patch
            cat /tmp/item408.decode.err
            cat /tmp/item408.transport-fix.out
            cat /tmp/item408.transport-fix.err
            cat /tmp/item408.apply.out
            cat /tmp/item408.apply.err
          } | tee /tmp/item408.diagnostics.txt
          exit 0

      - name: Upload reconstruction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: item408-prestop-diagnostics
          path: |
            /tmp/item408.b64
            /tmp/item408.patch
            /tmp/item408.diagnostics.txt
          if-no-files-found: error

      - name: Attempt clean exact-base publication
        env:
          BASE: 83ed3bb1606b708af16a2ad90a26d63553de6789
          TARGET: ci/r19-provenance-migration
        run: |
          set +e
          {
            grep -qx 'decode_rc=0' /tmp/item408.diagnostics.txt
            grep -qx 'transport_fix_rc=0' /tmp/item408.diagnostics.txt
            grep -qx 'apply_rc=0' /tmp/item408.diagnostics.txt
            git checkout --detach "$BASE"
            git apply /tmp/item408.patch
            git diff --check
            git add -A
            git config user.name "afl-rl build-seat"
            git config user.email "build-seat@users.noreply.github.com"
            tree="$(git write-tree)"
            commit="$(printf '%s\n' 'ci(item-408): prepare R19 provenance STOP-1' | git commit-tree "$tree" -p "$BASE")"
            echo "commit=$commit"
            git push --force origin "$commit:refs/heads/$TARGET"
            echo "published=$commit"
          } > /tmp/item408.publish.txt 2>&1
          publish_rc=$?
          echo "publish_rc=$publish_rc" >> /tmp/item408.publish.txt
          cat /tmp/item408.publish.txt
          exit 0

      - name: Upload publication diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: item408-prestop-publication
          path: /tmp/item408.publish.txt
          if-no-files-found: error

      - name: Enforce successful publication
        run: grep -qx 'publish_rc=0' /tmp/item408.publish.txt

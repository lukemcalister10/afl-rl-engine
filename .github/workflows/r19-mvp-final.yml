name: R19 MVP Final Materializer

on:
  push:
    branches:
      - recovery/r19-mvp-final

permissions:
  contents: write

concurrency:
  group: r19-mvp-final
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      BASE_SHA: 93bd01af86db00c169714652714a364bd2635764
      PREP_SHA: 51fb3cbc0790c0d825f2c5ddd9786ad65e32929a
      OUT_BRANCH: generated/r19-mvp
      RL_VENV: ${{ github.workspace }}/../rl_venv312
      RL_REPO: ${{ github.workspace }}
      CLAUDE_PROJECT_DIR: ${{ github.workspace }}
      PYTHONHASHSEED: "0"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"

    steps:
      - name: Checkout preparation head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact base and clean output route
        run: |
          set -euo pipefail
          test "$GITHUB_REF_NAME" = "recovery/r19-mvp-final"
          test "$(git merge-base HEAD "$PREP_SHA")" = "$PREP_SHA"
          git fetch origin integration/v2.11-final-rc --depth=1
          test "$(git rev-parse refs/remotes/origin/integration/v2.11-final-rc)" = "$BASE_SHA"
          if git ls-remote --exit-code --heads origin "$OUT_BRANCH" >/dev/null 2>&1; then
            echo "HALT: $OUT_BRANCH already exists"
            exit 1
          fi

      - name: Pin Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Prepare deterministic live-scoring environment
        run: |
          set -euo pipefail
          if ! command -v python3.12 >/dev/null 2>&1; then
            PYBIN="$(dirname "$(command -v python)")"
            ln -s "$PYBIN/python" "$PYBIN/python3.12"
          fi
          sudo mkdir -p /home/claude && sudo chown -R "$USER":"$USER" /home/claude
          bash setup_env.sh
          "$RL_VENV/bin/python" - <<'PY'
          import sys, numpy, scipy, sklearn, openpyxl
          got=(sys.version.split()[0],numpy.__version__,scipy.__version__,sklearn.__version__,openpyxl.__version__)
          want=('3.12.3','2.4.4','1.17.1','1.8.0','3.1.5')
          assert got==want,(got,want)
          print('pinned environment OK',got)
          PY
          mkdir -p /home/claude/rl_vendor /home/claude/rl_build
          cp -rf vendor/unidecode /home/claude/rl_vendor/unidecode
          for f in cm_400.pkl q97m.pkl v0surf.pkl; do
            [ -f "data/$f" ] && cp -f "data/$f" "/home/claude/$f" || true
          done
          cp -f data/rl_build/rl_app_data.json /home/claude/rl_build/rl_app_data.json
          bash bootstrap.sh

      - name: Verify score-file identities
        run: |
          set -euo pipefail
          "$RL_VENV/bin/python" - <<'PY'
          import hashlib, subprocess
          base='93bd01af86db00c169714652714a364bd2635764'
          fixtures={
            'session_2026-07-20/live_scoring_catchup/fixtures/R15.csv':'20d138b3523762022d1c9108ea120cb60f356008cdcaafa58ae2779a256df67b',
            'session_2026-07-20/live_scoring_catchup/fixtures/R16.csv':'c4d5b3cf5e1f83f73cd8d75c02a01d8480a032c8579a1e118f220dcf47511735',
            'session_2026-07-20/live_scoring_catchup/fixtures/R17.csv':'11797f6e33c135a8a673d53ede54fe754ad16f987c91abae3c937fdcae84f535',
            'session_2026-07-20/live_scoring_catchup/fixtures/R18.csv':'8d0b8ae0e9f8dd041961c2241de82365a16602ea242a3ed64f01f352dd0195c6',
            'session_2026-07-20/live_scoring_catchup/fixtures/R19.csv':'463fbb451c24ab6b4419a44fd9ea947fc5c1ed07b2a071a5637c1da9bdc178de',
          }
          for path,want in fixtures.items():
              assert hashlib.sha256(subprocess.check_output(['git','show',f'{base}:{path}'])).hexdigest()==want,path
              assert hashlib.sha256(open(path,'rb').read()).hexdigest()==want,path
          print('score inputs verified')
          PY

      - name: No-write preflight
        run: |
          set -euo pipefail
          unset INGEST_SCORE_APPLY INGEST_SCORE_APPLY_ARMED
          PYTHON="$RL_VENV/bin/python" tools/round_entry/weekly_update.sh catchup \
            --file 15=session_2026-07-20/live_scoring_catchup/fixtures/R15.csv \
            --file 16=session_2026-07-20/live_scoring_catchup/fixtures/R16.csv \
            --file 17=session_2026-07-20/live_scoring_catchup/fixtures/R17.csv \
            --file 18=session_2026-07-20/live_scoring_catchup/fixtures/R18.csv \
            --file 19=session_2026-07-20/live_scoring_catchup/fixtures/R19.csv \
            < /dev/null

      - name: Apply R15-R19 sequentially
        run: |
          set -euo pipefail
          PYTHON="$RL_VENV/bin/python" \
          INGEST_SCORE_APPLY_ARMED=1 \
          INGEST_SCORE_APPLY=github-actions-r19-owner-authorized \
          tools/round_entry/weekly_update.sh catchup \
            --file 15=session_2026-07-20/live_scoring_catchup/fixtures/R15.csv \
            --file 16=session_2026-07-20/live_scoring_catchup/fixtures/R16.csv \
            --file 17=session_2026-07-20/live_scoring_catchup/fixtures/R17.csv \
            --file 18=session_2026-07-20/live_scoring_catchup/fixtures/R18.csv \
            --file 19=session_2026-07-20/live_scoring_catchup/fixtures/R19.csv \
            --approve

      - name: Regenerate final UI bundles
        run: |
          set -euo pipefail
          "$RL_VENV/bin/python" ui/tools/extract_board_view.py
          "$RL_VENV/bin/python" - <<'PY'
          import json, pathlib, re
          cfg=pathlib.Path('ui/app/config.js')
          text=cfg.read_text()
          text=re.sub(r'EXPECTED_BOARD\s*[:=]\s*["\'][0-9a-f]+["\']','EXPECTED_BOARD: "92a8f3a0"',text)
          text=re.sub(r'DELTA_BASE_DEFAULT\s*[:=]\s*["\'][^"\']+["\']','DELTA_BASE_DEFAULT: "round"',text)
          cfg.write_text(text)
          club={
            'kind':'club_valuation',
            'stamp':{'asOfRound':19,'board':'92a8f3a0'},
            'halt':{'reason':'Club totals were not regenerated for the R19 weekly MVP; stale R14 numeric totals are intentionally withheld.','verdicts':[]}
          }
          pathlib.Path('ui/data/club_valuation.js').write_text('window.__CLUB_VALUATION__='+json.dumps(club,separators=(',',':'))+';\n')
          PY

      - name: Verify essential R19 state
        run: |
          set -euo pipefail
          "$RL_VENV/bin/python" - <<'PY'
          import hashlib, json, os, pathlib
          def md5(path): return hashlib.md5(pathlib.Path(path).read_bytes()).hexdigest()
          def js(path):
              text=pathlib.Path(path).read_text()
              return json.loads(text[text.index('{'):text.rindex('}')+1])
          board_id='92a8f3a0528e5668029ca8056a841821'
          store_id='f37d9716648cfe4382b8c6a24c4f064f'
          assert md5('data/rl_build/rl_app_data.json')==board_id
          assert md5('engine/rl_after/rl_model_data.json')==store_id
          boot=json.load(open('data/expected_boot.json'))
          season=json.load(open('data/season_state.json'))
          contract=json.load(open('data/release_contract.json'))
          assert boot.get('as_of_round')==19 and boot.get('board')==board_id and boot.get('store')==store_id
          assert season.get('as_of_round')==19 and season.get('source_store_md5')==store_id
          assert contract.get('as_of_round')==19
          assert contract.get('identities',{}).get('board')==board_id
          assert contract.get('identities',{}).get('store')==store_id
          assert contract.get('season_metadata',{}).get('as_of_round')==19
          state=json.load(open('engine/rl_after/ingestion/finalization_state.json'))
          expected={15:('692d6302','2fe26675'),16:('0b951852','8ad41708'),17:('c312eb5b','0308202f'),18:('64795076','4323c448'),19:('f37d9716','92a8f3a0')}
          for rnd,(store_head,board_head) in expected.items():
              row=state.get('rounds',{}).get(str(rnd),{})
              assert row.get('status')=='FINALIZED',(rnd,row)
              assert row.get('failure') in (None,''),(rnd,row.get('failure'))
              assert row.get('store_md5_after','').startswith(store_head)
              assert row.get('board_md5_after','').startswith(board_head)
          ledger=json.load(open('engine/rl_after/ingestion/applied_rounds_ledger.json'))['applied']
          counts={r:0 for r in range(15,20)}
          seen=set()
          for item in ledger:
              if isinstance(item,str): sid,season_n,rnd=item.rsplit('|',2)
              elif isinstance(item,dict): sid,season_n,rnd=item['stable_player_id'],item['season'],item['round']
              else: sid,season_n,rnd=item
              key=(sid,int(season_n),int(rnd))
              assert key not in seen,key
              seen.add(key)
              if key[2] in counts: counts[key[2]]+=1
          assert counts=={15:318,16:319,17:410,18:406,19:405},counts
          for name in ('value_history.json','rank_history.json','pos_rank_history.json'):
              hist=json.load(open('engine/rl_after/ingestion/'+name)); rounds=set()
              for player in hist.get('players',{}).values(): rounds.update(map(int,(player.get('by_round') or {}).keys()))
              assert set(range(14,20))<=rounds,(name,rounds)
          movers=js('ui/data/movers.js')
          assert movers.get('rounds')==[15,16,17,18,19]
          assert movers.get('integrity',{}).get('baseline_anchor_ok') is True
          assert movers.get('integrity',{}).get('board_chain_ok') is True
          board=json.load(open('data/rl_build/rl_app_data.json'))
          assert len(board['active'])==804
          app=js('ui/data/board_view_working.js')
          assert app.get('stamp',{}).get('asOfRound')==19
          assert str(app.get('stamp',{}).get('board_md5') or app.get('stamp',{}).get('srcmd5','')).startswith('92a8f3a0')
          for lens,year,label in ((1,2027,'+1'),(2,2028,'+2')):
              picks=[p for p in app.get('lensPicks',[]) if int(p.get('lens',-1))==lens and int(p.get('labelYear',-1))==year and not p.get('residual')]
              assert len(picks)==64,(label,len(picks))
              totals=app.get('draftAssetTotals',{}).get(label,{})
              assert totals.get('visible_1_64')==64617
              assert totals.get('residual_nd_tail')==4649
              assert totals.get('residual_mech')==14272
              assert totals.get('total')==83538
              assert totals.get('reconciled_to_f5') is True
          cfg=pathlib.Path('ui/app/config.js').read_text()
          assert 'EXPECTED_BOARD: "92a8f3a0"' in cfg
          assert 'DELTA_BASE_DEFAULT: "round"' in cfg
          assert os.environ.get('INGEST_SCORE_APPLY') is None
          assert os.environ.get('INGEST_SCORE_APPLY_ARMED') is None
          assert 'APPLY_DEFAULT = False' in pathlib.Path('engine/rl_after/ingestion/score_ingestor.py').read_text()
          print('R19 MVP state verified',counts)
          PY

      - name: Commit and push durable R19 branch
        id: push
        run: |
          set -euo pipefail
          rm -f .github/workflows/r19-mvp-final.yml .github/workflows/r19-materialize-recovery.yml
          find . -type d \( -name __pycache__ -o -name .pytest_cache \) -prune -exec rm -rf {} +
          git add \
            data/expected_boot.json \
            data/release_contract.json \
            data/rl_build/rl_app_data.json \
            data/rl_build/rl_app_data.json.srcmd5 \
            data/season_state.json \
            engine/rl_after/rl_model_data.json \
            engine/rl_after/ingestion/applied_rounds_ledger.json \
            engine/rl_after/ingestion/finalization_journal.jsonl \
            engine/rl_after/ingestion/finalization_state.json \
            engine/rl_after/ingestion/pos_rank_history.json \
            engine/rl_after/ingestion/rank_history.json \
            engine/rl_after/ingestion/value_history.json \
            engine/rl_after/ingestion/.weekly_txn/txn_catchup_r15 \
            engine/rl_after/ingestion/.weekly_txn/txn_catchup_r16 \
            engine/rl_after/ingestion/.weekly_txn/txn_catchup_r17 \
            engine/rl_after/ingestion/.weekly_txn/txn_catchup_r18 \
            engine/rl_after/ingestion/.weekly_txn/txn_catchup_r19 \
            engine/rl_after/ingestion/movers \
            ui/app/config.js \
            ui/data
          git add -u .github/workflows
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$OUT_BRANCH"
          git commit -m "Materialize verified Round 19 MVP state"
          git push origin "$OUT_BRANCH"
          SHA="$(git rev-parse HEAD)"
          test "$(git ls-remote --heads origin "$OUT_BRANCH" | awk '{print $1}')" = "$SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Browser smoke on durable state
        id: browser
        continue-on-error: true
        run: |
          set -euo pipefail
          PLAYWRIGHT_DIR="$RUNNER_TEMP/r19-playwright"
          mkdir -p "$PLAYWRIGHT_DIR"
          (cd "$PLAYWRIGHT_DIR" && npm init -y >/dev/null && npm install --no-save playwright@1 >/dev/null && npx playwright install chromium --with-deps)
          export NODE_PATH="$PLAYWRIGHT_DIR/node_modules"
          python3 -m http.server 4173 --bind 127.0.0.1 -d ui >/tmp/r19-ui-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          node <<'JS' 2>&1 | tee /tmp/r19-browser.log
          const { chromium, devices } = require('playwright');
          function assert(ok,msg){if(!ok)throw new Error(msg);}
          (async()=>{
            for(const profile of [{name:'desktop',viewport:{width:1366,height:900}},{name:'mobile',...devices['iPhone 12']}]){
              const browser=await chromium.launch();
              const context=await browser.newContext(profile);
              const page=await context.newPage();
              await page.goto('http://127.0.0.1:4173/',{waitUntil:'networkidle'});
              let body=await page.locator('body').innerText();
              assert(!/fail-closed/i.test(body),profile.name+': fail-closed board');
              assert(await page.evaluate(()=>window.__MATCHDAY_WORKING__.stamp.asOfRound===19),profile.name+': working stamp is not R19');
              assert(body.includes('Round 19'),profile.name+': Round 19 label missing');
              assert(await page.locator('.row.working').count()>0,profile.name+': board rows missing');
              assert(await page.evaluate(()=>MD.state.deltaBase==='round'),profile.name+': round delta not default');
              await page.getByRole('button',{name:'+1 yr',exact:true}).click();
              assert(await page.locator('.row.working').count()>804,profile.name+': future picks missing');
              await page.getByRole('button',{name:'Movers',exact:true}).click();
              const select=page.locator('.moversbar select').first();
              const options=await select.locator('option').allTextContents();
              assert(options.some(x=>x.startsWith('Round 15 '))&&options.some(x=>x.startsWith('Round 19 ')),profile.name+': Movers R15-R19 missing');
              await select.selectOption('19');
              body=await page.locator('body').innerText();
              assert(body.includes('R19')&&body.includes('R18'),profile.name+': R19 Movers view missing');
              await page.getByRole('button',{name:'Clubs',exact:true}).click();
              body=await page.locator('body').innerText();
              assert(body.includes('Overlay HALTED by the ingest'),profile.name+': Clubs halt missing');
              const overflow=await page.evaluate(()=>document.documentElement.scrollWidth>window.innerWidth+1);
              assert(!overflow,profile.name+': horizontal overflow');
              await browser.close();
            }
          })().catch(e=>{console.error(e);process.exit(1)});
          JS

      - name: Record browser outcome on durable branch
        if: always() && steps.push.outcome == 'success'
        run: |
          set -euo pipefail
          STATUS="${{ steps.browser.outcome }}"
          "$RL_VENV/bin/python" - "$STATUS" <<'PY'
          import json, pathlib, sys
          status=sys.argv[1]
          log=pathlib.Path('/tmp/r19-browser.log')
          payload={
            'kind':'r19_mvp_browser_result',
            'status':'PASS' if status=='success' else 'FAIL',
            'working_round':19,
            'board':'92a8f3a0528e5668029ca8056a841821',
            'store':'f37d9716648cfe4382b8c6a24c4f064f',
            'log_tail':log.read_text(errors='replace').splitlines()[-80:] if log.exists() else []
          }
          out=pathlib.Path('session_2026-07-21/r19_mvp/BROWSER_RESULT.json')
          out.parent.mkdir(parents=True,exist_ok=True)
          out.write_text(json.dumps(payload,indent=2)+'\n')
          PY
          git add session_2026-07-21/r19_mvp/BROWSER_RESULT.json
          git commit -m "Record Round 19 MVP browser result"
          git push origin "$OUT_BRANCH"

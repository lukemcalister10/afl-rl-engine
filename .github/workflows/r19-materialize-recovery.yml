name: R19 MVP Recovery Materializer

on:
  push:
    branches:
      - codex/implement-round-19-mvp-recovery-process

permissions:
  contents: write

concurrency:
  group: r19-materialize-recovery
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      RL_REPO: ${{ github.workspace }}
      CLAUDE_PROJECT_DIR: ${{ github.workspace }}
      PYTHONHASHSEED: "0"
      PYTHONDONTWRITEBYTECODE: "1"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      BASE_SHA: 93bd01af86db00c169714652714a364bd2635764
      OUT_BRANCH: generated/r19-mvp-recovery
      RL_VENV: ${{ github.workspace }}/../rl_venv312

    steps:
      - name: Checkout preparation commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate preparation source before any writes
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "codex/implement-round-19-mvp-recovery-process"
          git fetch origin integration/v2.11-final-rc --depth=1
          remote_base="$(git rev-parse refs/remotes/origin/integration/v2.11-final-rc)"
          test "$remote_base" = "$BASE_SHA" || { echo "HALT: integration base moved: $remote_base"; exit 1; }
          test "$(git merge-base HEAD "$BASE_SHA")" = "$BASE_SHA"
          cat > /tmp/r19-prep-expected.txt <<'EOF'
          .github/workflows/r19-materialize-recovery.yml
          engine/rl_after/ingestion/round_finalize.py
          engine/rl_after/ingestion/round_movers.py
          engine/rl_after/ingestion/test_weekly_updater.py
          EOF
          sed -i 's/^          //' /tmp/r19-prep-expected.txt
          sort -o /tmp/r19-prep-expected.txt /tmp/r19-prep-expected.txt
          git diff --name-only "$BASE_SHA"..HEAD | sort > /tmp/r19-prep-actual.txt
          diff -u /tmp/r19-prep-expected.txt /tmp/r19-prep-actual.txt

      - name: Pin Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Ensure python3.12 on PATH
        run: |
          set -euo pipefail
          if ! command -v python3.12 >/dev/null 2>&1; then
            PYBIN="$(dirname "$(command -v python)")"
            ln -s "$PYBIN/python" "$PYBIN/python3.12"
          fi
          python3.12 --version

      - name: Provision pinned Live Scoring environment
        run: |
          set -euo pipefail
          sudo mkdir -p /home/claude && sudo chown -R "$USER":"$USER" /home/claude
          bash setup_env.sh
          export PATH="$RL_VENV/bin:$PATH"
          "$RL_VENV/bin/python" - <<'PY'
          import sys, numpy, scipy, sklearn, openpyxl
          got = (sys.version.split()[0], numpy.__version__, scipy.__version__, sklearn.__version__, openpyxl.__version__)
          want = ('3.12.3', '2.4.4', '1.17.1', '1.8.0', '3.1.5')
          assert got == want, (got, want)
          print('pinned environment OK:', *got)
          PY
          mkdir -p /home/claude/rl_vendor /home/claude/rl_build
          cp -rf vendor/unidecode /home/claude/rl_vendor/unidecode
          for f in cm_400.pkl q97m.pkl v0surf.pkl; do
            [ -f "data/$f" ] && cp -f "data/$f" "/home/claude/$f" || true
          done
          cp -f data/rl_build/rl_app_data.json /home/claude/rl_build/rl_app_data.json
          bash bootstrap.sh

      - name: Verify authorized fixture identities before writes
        run: |
          set -euo pipefail
          "$RL_VENV/bin/python" - <<'PY'
          import hashlib, subprocess
          base='93bd01af86db00c169714652714a364bd2635764'
          fixtures = {
            'session_2026-07-20/live_scoring_catchup/fixtures/R15.csv':'20d138b3523762022d1c9108ea120cb60f356008cdcaafa58ae2779a256df67b',
            'session_2026-07-20/live_scoring_catchup/fixtures/R16.csv':'c4d5b3cf5e1f83f73cd8d75c02a01d8480a032c8579a1e118f220dcf47511735',
            'session_2026-07-20/live_scoring_catchup/fixtures/R17.csv':'11797f6e33c135a8a673d53ede54fe754ad16f987c91abae3c937fdcae84f535',
            'session_2026-07-20/live_scoring_catchup/fixtures/R18.csv':'8d0b8ae0e9f8dd041961c2241de82365a16602ea242a3ed64f01f352dd0195c6',
            'session_2026-07-20/live_scoring_catchup/fixtures/R19.csv':'463fbb451c24ab6b4419a44fd9ea947fc5c1ed07b2a071a5637c1da9bdc178de',
          }
          for path,want in fixtures.items():
              blob = subprocess.check_output(['git','show',f'{base}:{path}'])
              assert hashlib.sha256(blob).hexdigest() == want, path + ' base mismatch'
              assert hashlib.sha256(open(path,'rb').read()).hexdigest() == want, path + ' checkout mismatch'
          print('authorized fixture identities OK')
          PY

      - name: No-write preflight with write gates absent
        run: |
          set -euo pipefail
          unset INGEST_SCORE_APPLY INGEST_SCORE_APPLY_ARMED
          PYTHON="$RL_VENV/bin/python" tools/round_entry/weekly_update.sh catchup \
            --file 15=session_2026-07-20/live_scoring_catchup/fixtures/R15.csv \
            --file 16=session_2026-07-20/live_scoring_catchup/fixtures/R16.csv \
            --file 17=session_2026-07-20/live_scoring_catchup/fixtures/R17.csv \
            --file 18=session_2026-07-20/live_scoring_catchup/fixtures/R18.csv \
            --file 19=session_2026-07-20/live_scoring_catchup/fixtures/R19.csv

      - name: Materialize R15-R19 once
        run: |
          set -euo pipefail
          PYTHON="$RL_VENV/bin/python" \
          INGEST_SCORE_APPLY_ARMED=1 \
          INGEST_SCORE_APPLY=github-actions-r19-owner-authorized \
          tools/round_entry/weekly_update.sh catchup \
            --file 15=session_2026-07-20/live_scoring_catchup/fixtures/R15.csv \
            --file 16=session_2026-07-20/live_scoring_catchup/fixtures/R16.csv \
            --file 17=session_2026-07-20/live_scoring_catchup/fixtures/R17.csv \
            --file 18=session_2026-07-20/live_scoring_catchup/fixtures/R18.csv \
            --file 19=session_2026-07-20/live_scoring_catchup/fixtures/R19.csv \
            --approve

      - name: Package materialized state before post-write validation
        run: |
          set -euo pipefail
          cat > /tmp/r19-core-allow.txt <<'EOF'
          data/expected_boot.json
          data/release_contract.json
          data/rl_build/rl_app_data.json
          data/rl_build/rl_app_data.json.srcmd5
          data/season_state.json
          engine/rl_after/rl_model_data.json
          engine/rl_after/ingestion/applied_rounds_ledger.json
          engine/rl_after/ingestion/finalization_journal.jsonl
          engine/rl_after/ingestion/finalization_state.json
          engine/rl_after/ingestion/pos_rank_history.json
          engine/rl_after/ingestion/rank_history.json
          engine/rl_after/ingestion/value_history.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r15/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r15/manifest.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r16/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r16/manifest.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r17/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r17/manifest.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r18/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r18/manifest.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r19/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r19/manifest.json
          engine/rl_after/ingestion/movers/movers_R15.csv
          engine/rl_after/ingestion/movers/movers_R15.json
          engine/rl_after/ingestion/movers/movers_R16.csv
          engine/rl_after/ingestion/movers/movers_R16.json
          engine/rl_after/ingestion/movers/movers_R17.csv
          engine/rl_after/ingestion/movers/movers_R17.json
          engine/rl_after/ingestion/movers/movers_R18.csv
          engine/rl_after/ingestion/movers/movers_R18.json
          engine/rl_after/ingestion/movers/movers_R19.csv
          engine/rl_after/ingestion/movers/movers_R19.json
          ui/data/board_view_public.js
          ui/data/board_view_working.js
          ui/data/movers.js
          EOF
          sed -i 's/^          //' /tmp/r19-core-allow.txt
          sort -o /tmp/r19-core-allow.txt /tmp/r19-core-allow.txt
          git status --porcelain=v1 --untracked-files=all | sed 's/^...//' | sort > /tmp/r19-core-actual.txt
          comm -23 /tmp/r19-core-actual.txt /tmp/r19-core-allow.txt > /tmp/r19-core-forbidden.txt
          test ! -s /tmp/r19-core-forbidden.txt || { echo 'HALT: unexpected post-materialization paths'; cat /tmp/r19-core-forbidden.txt; exit 1; }
          test -s /tmp/r19-core-actual.txt
          tar -czf "$RUNNER_TEMP/r19-materialized-state.tar.gz" -T /tmp/r19-core-actual.txt
          sha256sum "$RUNNER_TEMP/r19-materialized-state.tar.gz" > "$RUNNER_TEMP/r19-materialized-state.sha256"
          cp /tmp/r19-core-actual.txt "$RUNNER_TEMP/r19-materialized-files.txt"

      - name: Upload materialized recovery checkpoint
        uses: actions/upload-artifact@v4
        with:
          name: r19-materialized-state-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/r19-materialized-state.tar.gz
            ${{ runner.temp }}/r19-materialized-state.sha256
            ${{ runner.temp }}/r19-materialized-files.txt
          if-no-files-found: error
          retention-days: 14

      - name: Validate deterministic recovery state and update UI seam
        run: |
          set -euo pipefail
          "$RL_VENV/bin/python" - <<'PY'
          import json, pathlib, re, sys
          sys.path.insert(0, 'engine/rl_after/ingestion')
          import round_finalize as RF
          root=pathlib.Path('.')
          state=json.load(open('engine/rl_after/ingestion/finalization_state.json'))
          expect={15:('692d6302','2fe26675'),16:('0b951852','8ad41708'),17:('c312eb5b','0308202f'),18:('64795076','4323c448'),19:('f37d9716','92a8f3a0')}
          for r in range(15,20):
              e=state['rounds'].get(str(r)) or {}
              assert e.get('status')=='FINALIZED', f'R{r} not FINALIZED'
              assert e.get('failure') in (None,''), f'R{r} stale failure'
              val=RF.RoundFinalizer(str(root))._validate_derivatives(r, e, historical=(r < 19))
              assert val.get('ok') is True, f'R{r} derivative validation failed: {val}'
              s,b=expect[r]
              assert e['store_md5_after'].startswith(s), (r,e['store_md5_after'])
              assert e['board_md5_after'].startswith(b), (r,e['board_md5_after'])
          boot=json.load(open('data/expected_boot.json'))
          assert boot.get('as_of_round')==19
          assert boot.get('board')=='92a8f3a0528e5668029ca8056a841821'
          assert boot.get('store')=='f37d9716648cfe4382b8c6a24c4f064f'
          ledger=json.load(open('engine/rl_after/ingestion/applied_rounds_ledger.json'))['applied']
          counts={r:0 for r in range(15,20)}
          seen=set()
          for x in ledger:
              if isinstance(x, str):
                  sid, season, rnd = x.rsplit('|', 2)
                  key=(sid, int(season), int(rnd))
              elif isinstance(x, dict):
                  key=(x.get('stable_player_id'), int(x.get('season')), int(x.get('round')))
              else:
                  sid, season, rnd = x
                  key=(sid, int(season), int(rnd))
              assert key not in seen, 'duplicate ledger entry'
              seen.add(key)
              if key[2] in counts:
                  counts[key[2]] += 1
          assert sum(counts.values())==1858, counts
          assert counts=={15:318,16:319,17:410,18:406,19:405}, counts
          for name in ['value_history.json','rank_history.json','pos_rank_history.json']:
              h=json.load(open('engine/rl_after/ingestion/'+name)); rounds=set()
              for p in h.get('players',{}).values():
                  rounds.update(map(int,(p.get('by_round') or {}).keys()))
              assert all(r in rounds for r in range(14,20)), name
          text=open('ui/data/movers.js').read(); movers=json.loads(text[text.index('{'):text.rindex('}')+1])
          assert movers.get('rounds')==[15,16,17,18,19]
          assert (movers.get('integrity') or {}).get('baseline_anchor_ok') is True
          assert (movers.get('integrity') or {}).get('board_chain_ok') is True
          board=json.load(open('data/rl_build/rl_app_data.json'))
          players=board['active'] if isinstance(board,dict) else board
          assert len(players)==804
          wtxt=open('ui/data/board_view_working.js').read(); app=json.loads(wtxt[wtxt.index('{'):wtxt.rindex('}')+1])
          assert not [p for p in app.get('lensPicks',[]) if int(p.get('lens',-1))==0]
          pvc={int(k):int(v) for k,v in (board.get('PVC') or app.get('pvc') or {}).items()}
          all_ids=[]
          for lens,year,label in [(1,2027,'+1'),(2,2028,'+2')]:
              picks=[p for p in app.get('lensPicks',[]) if int(p.get('lens'))==lens and int(p.get('labelYear'))==year]
              assert len(picks)==64, (label,len(picks))
              ids=[p.get('id') for p in picks]
              assert len(ids)==len(set(ids)), label+' duplicate ids'
              all_ids.extend(ids)
              by_n={int(p.get('n')):p for p in picks}
              assert sorted(by_n)==list(range(1,65)), label+' missing picks'
              vals=[int(by_n[n].get('v',by_n[n].get('value'))) for n in range(1,65)]
              assert vals==[pvc[n] for n in range(1,65)], label+' PVC mismatch'
              assert all(vals[i]>=vals[i+1] for i in range(63)), label+' not monotone'
              assert sum(vals)==64617
              totals=(app.get('draftAssetTotals') or {}).get(label) or {}
              assert totals.get('nVisiblePicks')==64
              assert totals.get('visible_1_64')==64617
              assert totals.get('residual_nd_tail')==4649
              assert totals.get('residual_mech')==14272
              assert totals.get('total')==83538
              assert totals.get('reconciled_to_f5') is True
              assert totals.get('f5_draft_pvc')==69266
              assert totals.get('f5_mech_pvc')==14272
              assert totals.get('f5_entrant_layer_pvc')==83538
              pt=(app.get('phantomTotals') or {}).get('league',{}).get(str(lens)) or {}
              assert pt.get('draftValue')==69266
              assert pt.get('freeValue')==14272
              assert pt.get('entrantValue')==83538
          assert len(all_ids)==len(set(all_ids))
          assert 'never summed' in ((app.get('draftAssetTotals') or {}).get('_meta') or {}).get('no_double_count','')
          cfg=pathlib.Path('ui/app/config.js')
          c=cfg.read_text()
          c=re.sub(r'EXPECTED_BOARD\s*[:=]\s*["\'][0-9a-f]+["\']', 'EXPECTED_BOARD: "92a8f3a0"', c)
          c=re.sub(r'DELTA_BASE_DEFAULT\s*[:=]\s*["\'][^"\']+["\']', 'DELTA_BASE_DEFAULT: "round"', c)
          cfg.write_text(c)
          club={
              'kind':'club_valuation',
              'stamp':{'asOfRound':19,'board':'92a8f3a0'},
              'halt':{
                  'reason':'Club totals were not regenerated for the R19 weekly MVP recovery; stale R14 numeric totals are intentionally withheld.',
                  'verdicts':[]
              }
          }
          pathlib.Path('ui/data/club_valuation.js').write_text('window.__CLUB_VALUATION__='+json.dumps(club,separators=(',',':'))+';\n')
          print('state validation OK', counts)
          PY

      - name: Browser smoke check
        run: |
          set -euo pipefail
          PLAYWRIGHT_DIR="$RUNNER_TEMP/r19-playwright"
          rm -rf "$PLAYWRIGHT_DIR" && mkdir -p "$PLAYWRIGHT_DIR"
          (cd "$PLAYWRIGHT_DIR" && npm init -y >/dev/null && npm install --no-save playwright@1 >/dev/null && npx playwright install chromium --with-deps)
          export NODE_PATH="$PLAYWRIGHT_DIR/node_modules"
          python3 -m http.server 4173 --bind 127.0.0.1 -d ui >/tmp/r19-ui.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          node <<'JS'
          const { chromium, devices } = require('playwright');
          function assert(ok, msg) { if (!ok) throw new Error(msg); }
          (async () => {
            for (const profile of [{name:'desktop', viewport:{width:1366,height:900}}, {name:'mobile', ...devices['iPhone 12']}]) {
              const browser = await chromium.launch();
              const context = await browser.newContext(profile);
              const page = await context.newPage();
              await page.goto('http://127.0.0.1:4173/', {waitUntil:'networkidle'});
              let body = await page.locator('body').innerText();
              assert(!/fail-closed/i.test(body), profile.name+': fail-closed board');
              assert(body.includes('Round 19'), profile.name+': R19 masthead missing');
              assert(await page.locator('.row.working').count() > 0, profile.name+': board rows missing');
              assert(await page.evaluate(() => MD.state.deltaBase === 'round'), profile.name+': round delta not default');
              await page.getByRole('button', {name:'+1 yr', exact:true}).click();
              assert(await page.locator('.row.working').count() > 804, profile.name+': future picks not rendered in unified ladder');
              await page.getByRole('button', {name:'Movers', exact:true}).click();
              const moverSelect=page.locator('.moversbar select').first();
              const options=await moverSelect.locator('option').allTextContents();
              assert(options.some(x=>x.startsWith('Round 15 ')) && options.some(x=>x.startsWith('Round 19 ')), profile.name+': R15-R19 mover options missing');
              await moverSelect.selectOption('15');
              body=await page.locator('body').innerText();
              assert(body.includes('R15') && body.includes('R14'), profile.name+': R15 mover report not rendered');
              await moverSelect.selectOption('19');
              body=await page.locator('body').innerText();
              assert(body.includes('R19') && body.includes('R18'), profile.name+': R19 mover report not rendered');
              await page.getByRole('button', {name:'Clubs', exact:true}).click();
              body=await page.locator('body').innerText();
              assert(body.includes('Overlay HALTED by the ingest'), profile.name+': club halt state missing');
              assert(/not regenerated|withheld/i.test(body), profile.name+': club reason missing');
              const overflow=await page.evaluate(() => document.documentElement.scrollWidth > window.innerWidth + 1);
              assert(!overflow, profile.name+': document horizontal overflow');
              await browser.close();
            }
          })().catch(e => { console.error(e); process.exit(1); });
          JS
          test ! -e package.json
          test ! -e package-lock.json
          test -z "$(find . -path './node_modules' -o -path '*/node_modules' -print -quit)"

      - name: Commit generated recovery branch and push
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "$OUT_BRANCH" >/dev/null 2>&1; then
            echo "HALT: $OUT_BRANCH already exists"; exit 1
          fi
          find . -type d \( -name __pycache__ -o -name .pytest_cache \) -prune -exec rm -rf {} +
          git rm .github/workflows/r19-materialize-recovery.yml
          git add -A
          cat > /tmp/r19-final-allow.txt <<'EOF'
          data/expected_boot.json
          data/release_contract.json
          data/rl_build/rl_app_data.json
          data/rl_build/rl_app_data.json.srcmd5
          data/season_state.json
          engine/rl_after/rl_model_data.json
          engine/rl_after/ingestion/applied_rounds_ledger.json
          engine/rl_after/ingestion/finalization_journal.jsonl
          engine/rl_after/ingestion/finalization_state.json
          engine/rl_after/ingestion/pos_rank_history.json
          engine/rl_after/ingestion/rank_history.json
          engine/rl_after/ingestion/value_history.json
          engine/rl_after/ingestion/round_finalize.py
          engine/rl_after/ingestion/round_movers.py
          engine/rl_after/ingestion/test_weekly_updater.py
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r15/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r15/manifest.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r16/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r16/manifest.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r17/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r17/manifest.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r18/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r18/manifest.json
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r19/journal.jsonl
          engine/rl_after/ingestion/.weekly_txn/txn_catchup_r19/manifest.json
          engine/rl_after/ingestion/movers/movers_R15.csv
          engine/rl_after/ingestion/movers/movers_R15.json
          engine/rl_after/ingestion/movers/movers_R16.csv
          engine/rl_after/ingestion/movers/movers_R16.json
          engine/rl_after/ingestion/movers/movers_R17.csv
          engine/rl_after/ingestion/movers/movers_R17.json
          engine/rl_after/ingestion/movers/movers_R18.csv
          engine/rl_after/ingestion/movers/movers_R18.json
          engine/rl_after/ingestion/movers/movers_R19.csv
          engine/rl_after/ingestion/movers/movers_R19.json
          ui/app/config.js
          ui/data/board_view_public.js
          ui/data/board_view_working.js
          ui/data/club_valuation.js
          ui/data/movers.js
          EOF
          sed -i 's/^          //' /tmp/r19-final-allow.txt
          sort -o /tmp/r19-final-allow.txt /tmp/r19-final-allow.txt
          git diff --cached --name-only "$BASE_SHA" | sort > /tmp/r19-final-actual.txt
          comm -23 /tmp/r19-final-actual.txt /tmp/r19-final-allow.txt > /tmp/r19-final-forbidden.txt
          test ! -s /tmp/r19-final-forbidden.txt || { echo 'HALT: forbidden final paths'; cat /tmp/r19-final-forbidden.txt; exit 1; }
          for required in \
            data/expected_boot.json data/release_contract.json data/rl_build/rl_app_data.json \
            data/rl_build/rl_app_data.json.srcmd5 data/season_state.json engine/rl_after/rl_model_data.json \
            engine/rl_after/ingestion/applied_rounds_ledger.json engine/rl_after/ingestion/finalization_journal.jsonl \
            engine/rl_after/ingestion/finalization_state.json engine/rl_after/ingestion/pos_rank_history.json \
            engine/rl_after/ingestion/rank_history.json engine/rl_after/ingestion/value_history.json \

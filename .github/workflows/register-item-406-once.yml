name: Register item 406 once

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Write authoritative register item 406
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          p = Path('docs/OPEN_ITEMS_REGISTER.md')
          text = p.read_text(encoding='utf-8')
          lines = text.splitlines()
          if not lines or not lines[0].startswith('# OPEN ITEMS REGISTER'):
              raise SystemExit('unexpected register header')

          item_start = '406. ROUND 19 MVP ACCEPTED + POST-RELEASE BACKLOG FILED'
          if any(line.startswith(item_start) for line in lines):
              print('item 406 already present')
          else:
              lines[0] = ('# OPEN ITEMS REGISTER — the single durable list · maintained by the supervisor pen · '
                          'v379 2026-07-22 · PEN: ITEM 406: ROUND 19 MVP ACCEPTED WITH EXPLICIT '
                          'POST-RELEASE BACKLOG — corrected present board accepted; Movers currently fails '
                          'closed pending corrected-engine R14–R19 replay (#138); complete UI/public/future-lens '
                          'and operating backlog filed (#139) · prior: ITEM 405')
              text = '\n'.join(lines) + '\n'
              marker = "\n## FABLE'S QUEUE (design seat, on return)"
              if marker not in text:
                  raise SystemExit('register insertion marker missing')
              item = r'''
406. ROUND 19 MVP ACCEPTED + POST-RELEASE BACKLOG FILED (owner ruling, 2026-07-22). ACCEPTED MVP: PR #135 at `a2945f61c0d6ba1182ccd2d7da2dcd34f65bf11e`; corrected present board `6f07f7cbe042f8e56426a01226c967c9`; corrected engine `7c452715dc98ac42723834d08021e9d2`; store unchanged `f37d9716648cfe4382b8c6a24c4f064f`. ACCEPTED LIMITATION: the corrected MVP's MOVERS TAB FAILS CLOSED because the latest report belongs to pre-correction board `92a8f3a0...`, not loaded board `6f07f7cb...`; owner accepts this for MVP and may use the previous MVP Movers at `0156ec445c29789f5dc7b79adca53e632a9da7f3` while disregarding the 18 corrected players. CORRECT FIX = clean R14–R19 replay under the corrected engine, not a forged lineage or single-round history patch; full scope/gates/workaround in issue #138. POST-RELEASE UI/PUBLIC/FUTURE-LENS REGISTER = issue #139, including: duplicate `Free Agents`/`Free agents` category (Liam Stocker/Tyler Brockman); redundant Round Review; weekly movement on player cards; arbitrary R14-to-latest Movers comparisons; public rankings team information; current-season eligibility/DPP display distinct from model position; valuation-relevant card fields (drafted/development/current eligibility/future position/split); exclude picks 65–80 from club pick totals and overall value (MATERIAL club-valuation policy; before/after required); rename Board→AFFL Rankings; tab-specific subtitles; persistent positional-value view; club-page summary; universal Back navigation; Public player click defect; Public club click defect (currently returns all-player list); Public recent form; Public card parity (draft pick + rank X of Y); and the +1/+2 evidence-year/shared-floor defect. ADDITIONAL PARKED ITEMS in #139: disposable Round 20 end-to-end rehearsal; club totals refresh currently wrapper-dependent (`tools/round_entry/weekly_update.sh`, not Python finalizer-owned); actual iPhone Safari/hosted delivery unproven; create `checkpoint/r19-mvp-baseline` after merge without touching `checkpoint/pre-chatgpt-v2.11`. WORK LOCATIONS: present correction evidence `session_2026-07-22/present_board_correction/`; Movers inputs/artifacts `engine/rl_after/ingestion/{value_history.json,rank_history.json,pos_rank_history.json,movers/}` + `ui/data/movers.js`; future-lens diagnostic `model/r19-staleness-graded-anchor-fix` (`tools/remediation/apply_staleness_graded_anchor_fix.py`, `compare_staleness_anchor_fix.py`, workflow); parked notes recorded in PR #135 under `archive/r19-ui-forward-lens-work-2026-07-22`; standalone exporter `recovery/r19-standalone-export`. No new owner UI note is implemented by this register entry. SOURCE: owner acceptance + explicit register instructions in-chat 2026-07-22. TRIGGER: after MVP release, owner prioritization; issue #138 for Movers, issue #139 for the remaining backlog. BOUNDARY: logging only; no implementation, merge, tag, release, deployment or score-write authorization.
'''
              text = text.replace(marker, '\n' + item.rstrip() + '\n' + marker, 1)
              p.write_text(text, encoding='utf-8')
          PY

          rm .github/workflows/register-item-406-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/OPEN_ITEMS_REGISTER.md .github/workflows/register-item-406-once.yml
          if git diff --cached --quiet; then
            echo 'No register change required.'
            exit 0
          fi
          git commit -m "register: item 406 — Round 19 accepted post-release backlog"
          git push origin HEAD:main

name: Final Integration

# Supervisor 2nd-review req 8: CI must INDEPENDENTLY RUN the generating tests behind every committed
# evidence file — the committed JSON is not sufficient on its own. This workflow re-derives the release
# state on the pinned runner and asserts: canonical switch-manifest closure + fail-closed, present/forward
# invariants, F5 reconciliation, clean-room engine rebuild-equality (byte-identical board + UI bundles),
# Round-14 season-state DERIVATION equality, stale calendar-progress + stale exposure-pace REJECTION,
# unified 868-asset future ranking with no row caps, and a disposable Round-15 regeneration that preserves
# the full future ladder + F5. Halt-not-warn: any step non-zero fails the run.

on:
  push:
  pull_request:

concurrency:
  group: final-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  final-integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RL_REPO: ${{ github.workspace }}
      CLAUDE_PROJECT_DIR: ${{ github.workspace }}
      RL_FV: ${{ github.workspace }}/engine/forward_valuation
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Pin Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Ensure python3.12 on PATH
        run: |
          set -euo pipefail
          if ! command -v python3.12 >/dev/null 2>&1; then
            PYBIN="$(dirname "$(command -v python)")"; ln -s "$PYBIN/python" "$PYBIN/python3.12"
          fi
          python3.12 --version

      - name: Engine absolute-path root (/home/claude/...)
        run: sudo mkdir -p /home/claude && sudo chown -R "$USER":"$USER" /home/claude

      - name: Provision pinned env (setup_env.sh)
        run: |
          set -euo pipefail
          bash setup_env.sh
          echo "$HOME/rl_venv312/bin" >> "$GITHUB_PATH"

      - name: Node + Playwright (Chromium) for the UI checks
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install playwright-core + Chromium
        run: |
          set -euo pipefail
          npm i --no-save playwright-core@1.47.2
          npx playwright install chromium
          echo "PLAYWRIGHT_CORE=$PWD/node_modules/playwright-core" >> "$GITHUB_ENV"
          echo "CHROME_BIN=$(node -e "const {chromium}=require('playwright-core');console.log(chromium.executablePath())")" >> "$GITHUB_ENV"

      - name: Config / release-state identity closure (fail-closed)
        run: |
          set -euo pipefail
          python3 config_manifest.py check
          python3 release_contract.py check
          python3 ruling_config_check.py
          python3 session_2026-07-21/final_integration/tools/config_inventory.py
          python3 session_2026-07-21/final_integration/tests/release_state_failclosed_test.py

      - name: Season-state — derivation, wiring, behaviour, stale rejection (req 2/4/5/7)
        run: python3 session_2026-07-21/final_integration/tests/season_progress_test.py

      - name: Present / forward invariants + F5 reconciliation (vs Board A / Board B oracles)
        run: python3 session_2026-07-21/final_integration/tools/invariant_proof.py

      - name: UI seams (extract / release / counting / club-curve / movers)
        run: |
          set -euo pipefail
          python3 ui/tests/extract_seam.test.py
          node    ui/tests/release_seam.test.js
          node    ui/tests/counting_rule.test.js
          python3 ui/tests/club_curve_provenance.test.py
          node    ui/tests/movers.test.js

      - name: UI — unified 868-asset ranking, no row caps, residual panel (Chromium)
        run: node session_2026-07-21/final_integration/tools/asset_view_ui_check.mjs

      - name: UI — responsive layout (Chromium, all widths)
        run: node ui/tests/responsive_layout.test.mjs

      - name: Bootstrap workspace (Guard 5)
        run: RL_VENDOR="$PWD/vendor" bash bootstrap.sh

      - name: Clean-room engine rebuild-equality (board + UI bundles byte-identical; Board B oracle)
        run: python3 session_2026-07-21/final_integration/tools/build_final_board.py

      - name: Round-14 season-state derivation equality + generated-bundle equality
        run: |
          set -euo pipefail
          # R14 derivation from the accepted store must reproduce calendar 0.58 + exposure 0.545 exactly.
          python3 -c "import season_state as S; st=S.derive(14,'engine/rl_after/rl_model_data.json'); assert st['calendar_progress']==0.58 and st['exposure_pace']==0.545, st; print('R14 season-state derivation equality OK')"
          # extract must reproduce the committed UI bundles byte-for-byte.
          cp ui/data/board_view_working.js /tmp/w.js; cp ui/data/board_view_public.js /tmp/p.js
          python3 ui/tools/extract_board_view.py >/dev/null
          cmp /tmp/w.js ui/data/board_view_working.js
          cmp /tmp/p.js ui/data/board_view_public.js
          echo "generated UI-bundle equality OK"

      - name: Disposable R15 regeneration preserves the future ladder + F5 (gate OFF, canonical untouched)
        run: RL_VENDOR="$PWD/vendor" python3 session_2026-07-21/final_integration/tests/r15_ladder_survival_proof.py

      - name: R14-R19 sequential season-state advance (disposable; canonical untouched)
        run: RL_VENDOR="$PWD/vendor" python3 session_2026-07-21/final_integration/tests/season_advance_r14_r19_proof.py

      - name: Track B fast unit + acceptance matrix
        run: |
          set -euo pipefail
          python3 engine/rl_after/ingestion/test_weekly_updater.py
          python3 engine/rl_after/ingestion/test_catchup_preflight.py
          python3 session_2026-07-21/final_integration/tools/acceptance_matrix.py

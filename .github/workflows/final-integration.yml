name: Final Integration

# Supervisor 2nd-review req 8: CI must INDEPENDENTLY RUN the generating tests behind every committed
# evidence file — the committed JSON is not sufficient on its own. This workflow re-derives the release
# state on the pinned runner and asserts: canonical switch-manifest closure + fail-closed, present/forward
# invariants, F5 reconciliation, clean-room engine rebuild-equality (byte-identical board + UI bundles),
# Round-14 season-state DERIVATION equality, stale calendar-progress + stale exposure-pace REJECTION,
# unified 868-asset future ranking with no row caps, and a disposable Round-15 regeneration that preserves
# the full future ladder + F5. Halt-not-warn: any step non-zero fails the run.

on:
  push:
  pull_request:

concurrency:
  group: final-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  final-integration:
    runs-on: ubuntu-24.04
    # The engine-build tail is heavy: clean-room rebuild + R15 ladder + the SEQUENTIAL R14->R19 advance
    # (six full board builds) + Track B, on top of env provisioning. 90 min leaves headroom on a slow runner.
    timeout-minutes: 90
    env:
      RL_REPO: ${{ github.workspace }}
      CLAUDE_PROJECT_DIR: ${{ github.workspace }}
      RL_FV: ${{ github.workspace }}/engine/forward_valuation
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          # History reads need real depth: invariant_proof.py + the clean-room driver do
          # `git show 70ef0ff:…` (Board B — now the DEFERRED forward diagnostic only, vP1/vP2 MEASURED not
          # gating), the R14 season-state step does `git show 93bd01af:…` (the R14 anchor store). A shallow
          # checkout (the default depth 1) has neither. (The superseded R14 Board A f05ebe6 is no longer read;
          # present-lens is gated against the committed reference_vector_1373e824 in BOTH tools.)
          fetch-depth: 0

      - name: Fetch the Board B historical forward-diagnostic commit (comparison only; never a build input)
        run: |
          set -euo pipefail
          # Board B (70ef0ff) is the tip of origin/codex/establish-forward-lens-acceptance and is NOT an
          # ancestor of this branch, so fetch-depth:0 alone will not pull it. Fetch the immutable SHA so
          # `git show 70ef0ff:…` resolves for the DEFERRED forward diagnostic (vP1/vP2 deltas — MEASURED,
          # not gating; present-lens is gated against the committed reference_vector_1373e824, not Board B).
          # It is read-only — not transplanted, not a build input — and the board_B JSON is deliberately
          # absent from this branch's tree.
          # Fetch by SHA (advertised branch tip); fall back to the branch ref if SHA-want is disabled.
          BOARD_B_SHA=70ef0ff36ca7633aa4097a9b7c1a730013870abe
          git fetch --no-tags origin "$BOARD_B_SHA" \
            || git fetch --no-tags origin +refs/heads/codex/establish-forward-lens-acceptance:refs/remotes/origin/codex/establish-forward-lens-acceptance
          git cat-file -e "$BOARD_B_SHA":session_2026-07-21/forward_lens_acceptance/board_B_lege1_legf1.json
          echo "Board B (70ef0ff) forward-diagnostic blob is resolvable"

      - name: Pin Python 3.12.3
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Ensure python3.12 on PATH
        run: |
          set -euo pipefail
          if ! command -v python3.12 >/dev/null 2>&1; then
            PYBIN="$(dirname "$(command -v python)")"; ln -s "$PYBIN/python" "$PYBIN/python3.12"
          fi
          python3.12 --version

      - name: Engine absolute-path root (/home/claude/...)
        run: sudo mkdir -p /home/claude && sudo chown -R "$USER":"$USER" /home/claude

      - name: Provision pinned env (setup_env.sh)
        run: |
          set -euo pipefail
          bash setup_env.sh
          echo "$HOME/rl_venv312/bin" >> "$GITHUB_PATH"

      - name: Node + Playwright (Chromium) for the UI checks
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install playwright-core + Chromium
        run: |
          set -euo pipefail
          npm i --no-save playwright-core@1.47.2
          # Pin the INSTALLER to the same version so it fetches the exact chromium revision
          # playwright-core@1.47.2 expects (an unpinned `npx playwright install` fetches a different
          # revision, leaving chromium.executablePath() pointing at a path that does not exist).
          npx --yes playwright@1.47.2 install chromium
          echo "PLAYWRIGHT_CORE=$PWD/node_modules/playwright-core" >> "$GITHUB_ENV"
          CHROME="$(node -e "const {chromium}=require('playwright-core');console.log(chromium.executablePath())")"
          # Belt-and-braces: if the pinned path is somehow absent, fall back to whatever chromium landed in
          # the ms-playwright cache (playwright-core 1.47.2 drives any recent chromium over stable CDP).
          if [ ! -x "$CHROME" ]; then CHROME="$(ls -d "$HOME"/.cache/ms-playwright/chromium-*/chrome-linux/chrome 2>/dev/null | head -1)"; fi
          test -x "$CHROME" || { echo "no chromium installed for the UI checks"; exit 1; }
          echo "CHROME_BIN=$CHROME" >> "$GITHUB_ENV"
          echo "Chromium for UI checks: $CHROME"

      - name: Config / release-state identity closure (fail-closed)
        run: |
          set -euo pipefail
          python3 config_manifest.py check
          python3 release_contract.py check
          python3 ruling_config_check.py
          python3 session_2026-07-21/final_integration/tools/config_inventory.py
          python3 session_2026-07-21/final_integration/tests/release_state_failclosed_test.py

      - name: Season-state — derivation, wiring, behaviour, stale rejection + FENCED reads halt (req 1/2/4/5/7)
        run: |
          set -euo pipefail
          python3 session_2026-07-21/final_integration/tests/season_progress_test.py
          python3 session_2026-07-21/final_integration/tests/season_state_fenced_test.py

      - name: Present / forward invariants + F5 reconciliation (present vs reference_vector_1373e824; forward-lens DEFERRED)
        run: python3 session_2026-07-21/final_integration/tools/invariant_proof.py

      - name: UI seams (extract / release / counting / club-curve / movers)
        run: |
          set -euo pipefail
          python3 ui/tests/extract_seam.test.py
          node    ui/tests/release_seam.test.js
          node    ui/tests/counting_rule.test.js
          python3 ui/tests/club_curve_provenance.test.py
          node    ui/tests/movers.test.js

      - name: UI — unified 868-asset ranking, no row caps, residual panel (Chromium)
        run: node session_2026-07-21/final_integration/tools/asset_view_ui_check.mjs

      - name: UI — responsive layout (Chromium, all widths)
        run: node ui/tests/responsive_layout.test.mjs

      - name: Bootstrap workspace (Guard 5)
        run: RL_VENDOR="$PWD/vendor" bash bootstrap.sh

      - name: Clean-room engine rebuild-equality (board + UI bundles byte-identical; present v vs reference_vector_1373e824; Board B forward DEFERRED)
        run: python3 session_2026-07-21/final_integration/tools/build_final_board.py

      - name: Round-14 season-state derivation equality + generated-bundle equality
        run: |
          set -euo pipefail
          # The R14 expectation (calendar 0.58 + exposure 0.545) derives from the EXACT R14 anchor store
          # (968de0c7 @ 93bd01af), NOT the current R19 store — that store advanced R14->R19 and derives the
          # current R19 season state (calendar 0.79 + exposure 0.727). ITEM 408 item 5.1.
          git show 93bd01af86db00c169714652714a364bd2635764:engine/rl_after/rl_model_data.json > /tmp/r14_store.json
          python3 -c "import season_state as S; r14=S.derive(14,'/tmp/r14_store.json'); assert r14['calendar_progress']==0.58 and r14['exposure_pace']==0.545 and str(r14['source_store_md5']).startswith('968de0c7'), r14; cur=S.derive(19,'engine/rl_after/rl_model_data.json'); assert cur['calendar_progress']==0.79 and cur['exposure_pace']==0.727 and str(cur['source_store_md5']).startswith('f37d9716'), cur; print('R14 anchor-store 0.58/0.545 + R19 current-store 0.79/0.727 season-state equality OK')"
          # extract must reproduce the committed UI bundles byte-for-byte.
          cp ui/data/board_view_working.js /tmp/w.js; cp ui/data/board_view_public.js /tmp/p.js
          python3 ui/tools/extract_board_view.py >/dev/null
          cmp /tmp/w.js ui/data/board_view_working.js
          cmp /tmp/p.js ui/data/board_view_public.js
          echo "generated UI-bundle equality OK"

      - name: Disposable R15 regeneration preserves the future ladder + F5 (gate OFF, canonical untouched)
        run: RL_VENDOR="$PWD/vendor" python3 session_2026-07-21/final_integration/tests/r15_ladder_survival_proof.py

      - name: R14-R19 sequential season-state advance (disposable; canonical untouched)
        run: RL_VENDOR="$PWD/vendor" python3 session_2026-07-21/final_integration/tests/season_advance_r14_r19_proof.py

      - name: Track B fast unit + acceptance matrix
        run: |
          set -euo pipefail
          python3 engine/rl_after/ingestion/test_weekly_updater.py
          python3 engine/rl_after/ingestion/test_catchup_preflight.py
          python3 session_2026-07-21/final_integration/tools/acceptance_matrix.py

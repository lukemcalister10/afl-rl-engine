name: Publish Round 19 MVP once

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: publish-r19-mvp-once
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    env:
      REPO: lukemcalister10/afl-rl-engine
      TARGET: 6c47f032f88e0a1c36b9330e98c347d34523576a
      TAG: v2.11-r19-mvp
      CHECKPOINT: checkpoint/r19-mvp-baseline
      BOARD: 6f07f7cbe042f8e56426a01226c967c9
      ENGINE: 7c452715dc98ac42723834d08021e9d2
      STORE: f37d9716648cfe4382b8c6a24c4f064f
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout exact accepted merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET }}
          fetch-depth: 0

      - name: Verify immutable release inputs
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET"
          git fetch origin "refs/heads/$CHECKPOINT:refs/remotes/origin/$CHECKPOINT"
          test "$(git rev-parse refs/remotes/origin/$CHECKPOINT)" = "$TARGET"
          python3 - <<'PY'
          import json, os
          boot = json.load(open('data/expected_boot.json', encoding='utf-8'))
          assert boot['board'] == os.environ['BOARD'], boot['board']
          assert boot['engine_head'] == os.environ['ENGINE'], boot['engine_head']
          assert boot['store'] == os.environ['STORE'], boot['store']
          assert boot['as_of_round'] == 19, boot['as_of_round']
          print('release identities verified')
          PY

      - name: Build downloadable MVP artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/portable
          cp -R ui dist/portable/ui
          cat > dist/portable/README.txt <<'TXT'
          AFFL ValueBoard — Round 19 MVP

          Open ui/index.html in Chrome or Edge after extracting this ZIP.

          Accepted integration commit: 6c47f032f88e0a1c36b9330e98c347d34523576a
          Board: 6f07f7cbe042f8e56426a01226c967c9
          Engine: 7c452715dc98ac42723834d08021e9d2
          Store: f37d9716648cfe4382b8c6a24c4f064f

          Known MVP limitations:
          - Movers is unavailable because its historical report still identifies the pre-correction board.
          - The +1/+2 evidence-year and shared-floor behaviour is parked for post-release correction.
          - UI and Public-view backlog is tracked in GitHub issue #139.
          - Corrected-engine R14-R19 Movers rebuild is tracked in GitHub issue #138.
          - Score writing is OFF. This release does not deploy a public website.
          TXT

          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('ui')
          html = (root / 'index.html').read_text(encoding='utf-8')

          css_pat = re.compile(r'<link\s+rel="stylesheet"\s+href="([^"]+)">')
          def css_repl(match):
              path = root / match.group(1)
              return '<style>\n' + path.read_text(encoding='utf-8') + '\n</style>'
          html = css_pat.sub(css_repl, html)

          script_pat = re.compile(r'<script\s+src="([^"]+)"></script>')
          def js_repl(match):
              path = root / match.group(1)
              js = path.read_text(encoding='utf-8').replace('</script>', '<\\/script>')
              return '<script>\n' + js + '\n</script>'
          html = script_pat.sub(js_repl, html)

          banner = ('<!-- AFFL Round 19 MVP standalone; commit '
                    '6c47f032f88e0a1c36b9330e98c347d34523576a; '
                    'board 6f07f7cbe042f8e56426a01226c967c9 -->\n')
          html = html.replace('<!doctype html>\n', '<!doctype html>\n' + banner, 1)
          out = Path('dist/ValueBoard_Round_19_MVP.html')
          out.write_text(html, encoding='utf-8')
          PY

          test -s dist/ValueBoard_Round_19_MVP.html
          ! grep -Eq '<script[[:space:]]+src=|<link[[:space:]]+rel="stylesheet"[[:space:]]+href=' dist/ValueBoard_Round_19_MVP.html
          grep -q "$BOARD" dist/ValueBoard_Round_19_MVP.html
          grep -q 'Phoenix Gothard' dist/ValueBoard_Round_19_MVP.html

          (
            cd dist/portable
            zip -qr ../AFFL_Round_19_MVP_portable.zip .
          )

          cat > dist/RELEASE_MANIFEST.txt <<TXT
          tag=$TAG
          checkpoint=$CHECKPOINT
          commit=$TARGET
          round=19
          board=$BOARD
          engine=$ENGINE
          store=$STORE
          score_write=OFF
          public_deployment=NONE
          ci_waiver=Four stale pre-R19 harness failures accepted by owner; not represented as green.
          TXT

          (
            cd dist
            sha256sum ValueBoard_Round_19_MVP.html AFFL_Round_19_MVP_portable.zip RELEASE_MANIFEST.txt > SHA256SUMS.txt
          )

      - name: Write release notes
        shell: bash
        run: |
          cat > dist/RELEASE_NOTES.md <<'MD'
          # AFFL ValueBoard — Round 19 MVP

          This is the owner-approved downloadable MVP from integration commit `6c47f032f88e0a1c36b9330e98c347d34523576a`.

          ## Release identities

          - Round: **19**
          - Board: `6f07f7cbe042f8e56426a01226c967c9`
          - Engine: `7c452715dc98ac42723834d08021e9d2`
          - Store: `f37d9716648cfe4382b8c6a24c4f064f`
          - Checkpoint: `checkpoint/r19-mvp-baseline`
          - Score writing: **OFF**
          - Public deployment: **none**

          ## Included downloads

          - `ValueBoard_Round_19_MVP.html` — standalone single-file MVP.
          - `AFFL_Round_19_MVP_portable.zip` — extracted folder version; open `ui/index.html`.
          - `RELEASE_MANIFEST.txt` — immutable identities and operating boundaries.
          - `SHA256SUMS.txt` — checksums for the downloads.

          ## Accepted present-board correction

          The graded-staleness correction changes exactly 18 present ratings, leaves 786 unchanged and moves Phoenix Gothard from 410 to 1,852. It contains no named-player override and no score alteration.

          ## Known MVP limitations

          - **Movers is unavailable** because its latest committed report identifies the pre-correction board. The corrected-engine R14–R19 rebuild is tracked in issue #138.
          - The **+1/+2 evidence-year and shared-floor defect** remains parked.
          - The UI, Public-view, pick-policy and navigation backlog is tracked in issue #139.
          - Four standard checks remain red because their harnesses retain pre-R19 fixtures and oracles. The owner explicitly accepted this waiver for the MVP; the checks are not represented as green.

          This release does not enable score writing and does not create or deploy a public website.
          MD

      - name: Create and verify GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "release $TAG already exists; replacing assets only"
            gh release upload "$TAG" --repo "$REPO" --clobber \
              dist/ValueBoard_Round_19_MVP.html \
              dist/AFFL_Round_19_MVP_portable.zip \
              dist/RELEASE_MANIFEST.txt \
              dist/SHA256SUMS.txt
          else
            gh release create "$TAG" --repo "$REPO" --target "$TARGET" \
              --title "AFFL ValueBoard Round 19 MVP" \
              --notes-file dist/RELEASE_NOTES.md \
              dist/ValueBoard_Round_19_MVP.html \
              dist/AFFL_Round_19_MVP_portable.zip \
              dist/RELEASE_MANIFEST.txt \
              dist/SHA256SUMS.txt
          fi
          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          test "$(git rev-list -n 1 "$TAG")" = "$TARGET"
          gh release view "$TAG" --repo "$REPO" --json tagName,targetCommitish,isDraft,isPrerelease,url

      - name: Remove one-shot workflow from main
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          if [ -f .github/workflows/publish-r19-mvp-once.yml ]; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git rm .github/workflows/publish-r19-mvp-once.yml
            git commit -m "release: remove one-shot Round 19 MVP publisher"
            git push origin HEAD:main
          fi
